<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
/* ═══════════════════════════════════════════
   СИСТЕМНЫЕ ПЕРЕМЕННЫЕ / THEMES
   ═══════════════════════════════════════════ */
[data-theme="neural"]{--A:#00F0FF;--B:#C724FF;--C:#FFD700;--bg:#030609;--bg2:#06101c;--card:rgba(6,16,30,0.84);--txt:#EEF4FF;--txt2:rgba(150,185,230,0.65);--brd:rgba(0,240,255,0.10);--gA:0 0 44px rgba(0,240,255,0.22);--gB:0 0 44px rgba(199,36,255,0.22);--gC:0 0 36px rgba(255,215,0,0.18);}
[data-theme="luxury"]{--A:#FFD700;--B:#C724FF;--C:#00F0FF;--bg:#050306;--bg2:#0d0810;--card:rgba(14,8,20,0.88);--txt:#FFF8E6;--txt2:rgba(210,190,155,0.62);--brd:rgba(255,215,0,0.11);--gA:0 0 44px rgba(255,215,0,0.20);--gB:0 0 44px rgba(199,36,255,0.20);--gC:0 0 36px rgba(0,240,255,0.14);}
[data-theme="emerald"]{--A:#00FF88;--B:#00C8FF;--C:#FFD700;--bg:#020b06;--bg2:#04140a;--card:rgba(4,14,8,0.88);--txt:#E6FFF4;--txt2:rgba(130,200,165,0.62);--brd:rgba(0,255,136,0.10);--gA:0 0 44px rgba(0,255,136,0.20);--gB:0 0 44px rgba(0,200,255,0.20);--gC:0 0 36px rgba(255,215,0,0.14);}
[data-theme="indigo"]{--A:#4F6EF7;--B:#9B2EFF;--C:#FF6B2E;--bg:#F2F5FF;--bg2:#E6EAFF;--card:rgba(255,255,255,0.88);--txt:#0C1030;--txt2:rgba(28,38,100,0.54);--brd:rgba(79,110,247,0.16);--gA:0 6px 36px rgba(79,110,247,0.16);--gB:0 6px 36px rgba(155,46,255,0.14);--gC:0 6px 36px rgba(255,107,46,0.14);}

/* ═══════════════════════════════════════════
   RESET + BASE
   ═══════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);color:var(--txt);overflow-x:hidden;line-height:1.6;
  transition:background .6s cubic-bezier(.4,0,.2,1),color .6s cubic-bezier(.4,0,.2,1);
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--A),var(--B));border-radius:3px}
::selection{background:color-mix(in srgb,var(--A) 25%,transparent);color:var(--txt)}

/* ═══════════════════════════════════════════
   ТИПОГРАФИКА
   ═══════════════════════════════════════════ */
.fD{font-family:'Space Grotesk',sans-serif}
.fM{font-family:'JetBrains Mono',monospace}
.g-ab{background:linear-gradient(135deg,var(--A),var(--B));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-abc{background:linear-gradient(135deg,var(--A),var(--B) 50%,var(--C));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.glow-a{text-shadow:0 0 24px color-mix(in srgb,var(--A) 55%,transparent),0 0 60px color-mix(in srgb,var(--A) 20%,transparent)}
.ca{color:var(--A)}.cb{color:var(--B)}.cc{color:var(--C)}

/* ═══════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════ */
.wrap{max-width:1240px;margin:0 auto;padding:0 40px}
.sec{padding:120px 0;position:relative}
@media(max-width:768px){.wrap{padding:0 18px}.sec{padding:72px 0}}

.sec-lbl{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--A);margin-bottom:14px;transition:color .55s}
.sec-h{font-family:'Space Grotesk',sans-serif;font-weight:700;line-height:1.08;letter-spacing:-.025em;margin-bottom:18px;font-size:clamp(28px,5vw,56px);transition:color .55s}
.sec-p{font-size:clamp(14px,1.8vw,17px);color:var(--txt2);line-height:1.78;font-weight:300}

/* ═══════════════════════════════════════════
   КНОПКИ
   ═══════════════════════════════════════════ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Space Grotesk',sans-serif;font-weight:600;letter-spacing:.05em;text-transform:uppercase;font-size:11px;border-radius:100px;border:none;cursor:pointer;transition:all .32s cubic-bezier(.4,0,.2,1);text-decoration:none;white-space:nowrap;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;min-height:44px;padding:14px 30px}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.14),transparent);opacity:0;transition:opacity .3s}
.btn:hover::before{opacity:1}
.btn-p{background:linear-gradient(135deg,var(--A),var(--B));color:#fff;box-shadow:0 4px 24px color-mix(in srgb,var(--A) 28%,transparent);transition:all .32s cubic-bezier(.4,0,.2,1)}
.btn-p:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 10px 40px color-mix(in srgb,var(--A) 38%,transparent)}
.btn-p:active{transform:translateY(0) scale(.98)}
.btn-g{background:color-mix(in srgb,var(--A) 6%,transparent);color:var(--A);border:1px solid var(--brd)}
.btn-g:hover{background:color-mix(in srgb,var(--A) 12%,transparent);border-color:color-mix(in srgb,var(--A) 45%,transparent);box-shadow:var(--gA);transform:translateY(-2px)}
.btn-gold{background:linear-gradient(135deg,var(--C),color-mix(in srgb,var(--C) 65%,#e06000));color:#05030a;font-weight:700}
.btn-gold:hover{transform:translateY(-3px);box-shadow:var(--gC)}

/* ═══════════════════════════════════════════
   LIVE CHIP
   ═══════════════════════════════════════════ */
.live-chip{display:inline-flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:#00FF88}
.live-dot{width:7px;height:7px;border-radius:50%;background:#00FF88;animation:livePulse 1.7s ease-in-out infinite}
@keyframes livePulse{0%{box-shadow:0 0 0 0 rgba(0,255,136,.55)}70%{box-shadow:0 0 0 9px rgba(0,255,136,0)}100%{box-shadow:0 0 0 0 rgba(0,255,136,0)}}

/* Chip/тег */
.chip{display:inline-flex;align-items:center;background:color-mix(in srgb,var(--A) 6%,transparent);border:1px solid var(--brd);border-radius:100px;padding:6px 15px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txt2);white-space:nowrap;transition:all .28s;cursor:default;min-height:34px}
.chip:hover{border-color:color-mix(in srgb,var(--A) 40%,transparent);color:var(--A)}

/* ═══════════════════════════════════════════
   NAVBAR
   ═══════════════════════════════════════════ */
#nav{position:fixed;top:0;left:0;right:0;z-index:500;padding:20px 40px;transition:all .42s cubic-bezier(.4,0,.2,1)}
#nav.scrolled{background:color-mix(in srgb,var(--bg) 90%,transparent);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border-bottom:1px solid var(--brd);padding:12px 40px}
@media(max-width:768px){#nav{padding:14px 18px}#nav.scrolled{padding:10px 18px}}
.nav-in{max-width:1240px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0}
.logo-led{width:7px;height:7px;border-radius:50%;background:var(--A);box-shadow:0 0 8px var(--A),0 0 16px color-mix(in srgb,var(--A) 50%,transparent);animation:led 2.5s ease-in-out infinite;flex-shrink:0;transition:background .55s,box-shadow .55s}
@keyframes led{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.62)}}
.logo-txt{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;letter-spacing:.14em;text-transform:uppercase;color:var(--txt)}
#nav-links{display:flex;align-items:center;gap:28px;list-style:none}
@media(max-width:900px){#nav-links{display:none}}
.nav-a{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--txt2);text-decoration:none;position:relative;padding:3px 0;transition:color .28s;display:flex;align-items:center;min-height:44px}
.nav-a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;background:var(--A);transition:width .3s cubic-bezier(.4,0,.2,1)}
.nav-a:hover{color:var(--A)}.nav-a:hover::after{width:100%}
.nav-ctrl{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* Тема-свитчер */
.theme-sw{display:flex;align-items:center;gap:5px;background:color-mix(in srgb,var(--A) 5%,transparent);border:1px solid var(--brd);border-radius:100px;padding:5px 7px;transition:all .3s}
.theme-sw:hover{border-color:color-mix(in srgb,var(--A) 28%,transparent)}
.td{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .28s;flex-shrink:0;background:none;padding:0;min-width:16px}
.td:hover{transform:scale(1.25)}.td.on{border-color:var(--txt);transform:scale(1.15)}
.td[data-t="neural"]{background:linear-gradient(135deg,#00F0FF,#C724FF)}
.td[data-t="luxury"]{background:linear-gradient(135deg,#FFD700,#C724FF)}
.td[data-t="emerald"]{background:linear-gradient(135deg,#00FF88,#00C8FF)}
.td[data-t="indigo"]{background:linear-gradient(135deg,#4F6EF7,#9B2EFF)}

/* Языковой свитчер */
.lang-sw{display:flex;background:color-mix(in srgb,var(--A) 5%,transparent);border:1px solid var(--brd);border-radius:100px;padding:3px;gap:2px}
.lb{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.1em;padding:6px 12px;border-radius:100px;border:none;cursor:pointer;background:transparent;color:var(--txt2);transition:all .28s;min-height:34px;display:flex;align-items:center}
.lb.on{background:linear-gradient(135deg,var(--A),var(--B));color:#fff}
#nav-cta{display:none;padding:10px 20px;font-size:10px}
@media(min-width:900px){#nav-cta{display:inline-flex}}

/* Бургер */
#burger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:6px;min-width:44px;min-height:44px;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
#burger span{display:block;width:22px;height:2px;background:var(--txt);border-radius:2px;transition:all .32s cubic-bezier(.4,0,.2,1)}
@media(max-width:900px){#burger{display:flex}}
#burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
#burger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
#burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* Мобильное меню */
#mob-menu{display:none;position:fixed;inset:0;z-index:490;background:color-mix(in srgb,var(--bg) 97%,transparent);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);flex-direction:column;align-items:center;justify-content:center;gap:28px}
#mob-menu.open{display:flex}
.mob-a{font-family:'Space Grotesk',sans-serif;font-size:clamp(22px,7vw,34px);font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--txt);text-decoration:none;transition:color .28s;padding:8px 20px;-webkit-tap-highlight-color:transparent}
.mob-a:hover{color:var(--A)}

/* Переключатель производительности */
#perf-toggle{display:none;align-items:center;gap:8px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt2);background:color-mix(in srgb,var(--A) 6%,transparent);border:1px solid var(--brd);border-radius:100px;padding:8px 14px;transition:all .3s;margin-top:8px}
@media(max-width:900px){#perf-toggle{display:inline-flex}}
#perf-toggle:hover{border-color:var(--A);color:var(--A)}
.perf-dot{width:8px;height:8px;border-radius:50%;background:var(--C);box-shadow:0 0 8px var(--C);transition:background .3s}
#perf-toggle.fx-on .perf-dot{background:var(--A);box-shadow:0 0 8px var(--A)}

/* ═══════════════════════════════════════════
   HERO
   ═══════════════════════════════════════════ */
#hero{min-height:100svh;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:100px 20px 60px}
#hero-canvas{position:absolute;inset:0;z-index:0;pointer-events:none;width:100%;height:100%}
.hero-glow{position:absolute;inset:0;pointer-events:none;z-index:1;background:radial-gradient(ellipse 80% 60% at 50% 44%,color-mix(in srgb,var(--A) 7%,transparent),transparent 70%),radial-gradient(ellipse 55% 42% at 85% 15%,color-mix(in srgb,var(--B) 8%,transparent),transparent 60%),radial-gradient(ellipse 45% 38% at 12% 85%,color-mix(in srgb,var(--C) 5%,transparent),transparent 58%);transition:all .55s}
.hero-content{position:relative;z-index:2;text-align:center;width:100%;max-width:980px}
.hero-badge{display:inline-flex;align-items:center;gap:9px;background:color-mix(in srgb,var(--A) 8%,transparent);border:1px solid color-mix(in srgb,var(--A) 24%,transparent);border-radius:100px;padding:9px 22px;margin-bottom:34px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--A);animation:badgeGlow 3.5s ease-in-out infinite;transition:all .55s}
.badge-led{width:6px;height:6px;border-radius:50%;background:var(--A);animation:led 1.6s ease-in-out infinite}
@keyframes badgeGlow{0%,100%{box-shadow:0 0 14px color-mix(in srgb,var(--A) 18%,transparent)}50%{box-shadow:0 0 32px color-mix(in srgb,var(--A) 34%,transparent),0 0 70px color-mix(in srgb,var(--A) 10%,transparent)}}
.hero-h{font-family:'Space Grotesk',sans-serif;font-weight:700;line-height:.95;letter-spacing:-.032em;margin-bottom:26px;font-size:clamp(40px,9vw,98px)}
.hero-sub{font-size:clamp(14px,2vw,19px);color:var(--txt2);max-width:560px;margin:0 auto 48px;line-height:1.76;font-weight:300}
.hero-stats{display:flex;gap:clamp(24px,5vw,56px);justify-content:center;flex-wrap:wrap;margin-bottom:52px}
.hs{text-align:center}
.hs-n{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(28px,5vw,42px);line-height:1;margin-bottom:5px}
.hs-l{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--txt2)}
.tags-row{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin-top:30px}
.scroll-ind{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:7px;opacity:.38}
.scroll-txt{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--txt2)}
.scroll-line{width:1px;height:42px;background:linear-gradient(to bottom,var(--A),transparent);animation:scBob 2.4s ease-in-out infinite}
@keyframes scBob{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}

/* ═══════════════════════════════════════════
   GROWTH OS — иконки + hover-карточка
   ═══════════════════════════════════════════ */
#os-track{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;align-items:center;position:relative}
.os-node{position:relative;cursor:pointer;flex-shrink:0}
.os-ico-wrap{width:72px;height:72px;border-radius:20px;display:flex;align-items:center;justify-content:center;background:color-mix(in srgb,var(--A) 8%,transparent);border:1px solid var(--brd);transition:all .38s;backdrop-filter:blur(12px)}
.os-node:hover .os-ico-wrap{border-color:color-mix(in srgb,var(--A) 45%,transparent);box-shadow:var(--gA);transform:scale(1.1)}
.os-ico-wrap svg{width:32px;height:32px;transition:stroke .55s}

/* Hover-карточка */
.os-hover-card{position:absolute;bottom:calc(100% + 14px);left:50%;transform:translateX(-50%) translateY(8px);width:200px;background:var(--card);border:1px solid color-mix(in srgb,var(--A) 28%,transparent);border-radius:16px;padding:16px 18px;backdrop-filter:blur(24px);pointer-events:none;opacity:0;transition:opacity .28s,transform .28s;z-index:10;box-shadow:var(--gA)}
.os-hover-card::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:7px solid transparent;border-top-color:color-mix(in srgb,var(--A) 28%,transparent)}
.os-node:hover .os-hover-card{opacity:1;transform:translateX(-50%) translateY(0)}
.os-hc-title{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;margin-bottom:6px;color:var(--A)}
.os-hc-desc{font-size:11px;color:var(--txt2);line-height:1.55}

.os-arr{color:var(--A);opacity:.45;animation:arrFlow 2.3s ease-in-out infinite;display:flex;align-items:center}
.os-arr svg{width:18px;height:18px;stroke:var(--A)}
@keyframes arrFlow{0%,100%{opacity:.28;transform:translateX(0)}50%{opacity:.8;transform:translateX(5px)}}

/* ═══════════════════════════════════════════
   DASHBOARD
   ═══════════════════════════════════════════ */
.dash-frame{background:var(--card);border:1px solid var(--brd);border-radius:26px;padding:32px;backdrop-filter:blur(24px);box-shadow:0 0 80px color-mix(in srgb,var(--A) 5%,transparent);position:relative;overflow:hidden;transition:border-color .55s,box-shadow .55s}
.dash-frame::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--A) 38%,var(--B) 62%,transparent 100%);transition:background .55s}
.dash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
@media(min-width:640px){.dash-grid{grid-template-columns:repeat(4,1fr)}}
.dash-cell{background:color-mix(in srgb,var(--bg) 55%,transparent);border:1px solid var(--brd);border-radius:14px;padding:18px 16px;position:relative;overflow:hidden;cursor:pointer;transition:all .35s}
.dash-cell::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--_ac,var(--A));transition:background .55s}
.dash-cell:hover{border-color:color-mix(in srgb,var(--_ac,var(--A)) 35%,transparent);box-shadow:0 0 28px color-mix(in srgb,var(--_ac,var(--A)) 16%,transparent);transform:translateY(-3px)}
.dash-cell.active{border-color:color-mix(in srgb,var(--_ac,var(--A)) 55%,transparent);box-shadow:0 0 36px color-mix(in srgb,var(--_ac,var(--A)) 22%,transparent)}
.dash-val{font-family:'Space Grotesk',sans-serif;font-size:clamp(22px,4vw,34px);font-weight:700;line-height:1;margin-bottom:4px;transition:color .55s}
.dash-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt2)}
.dash-delta{font-family:'JetBrains Mono',monospace;font-size:10px;color:#00FF88;margin-top:8px}

/* Спарк-бар */
.spark{display:flex;align-items:flex-end;gap:3px}
.sp-bar{flex:1;border-radius:2px 2px 0 0;background:linear-gradient(to top,var(--A),var(--B));transform-origin:bottom;transform:scaleY(0);transition:background .55s,height .4s cubic-bezier(.4,0,.2,1)}

/* ═══════════════════════════════════════════
   ROI КАЛЬКУЛЯТОР — Liquid Glass
   ═══════════════════════════════════════════ */
.calc-wrap{background:linear-gradient(135deg,color-mix(in srgb,var(--A) 4%,transparent),color-mix(in srgb,var(--B) 4%,transparent));border:1px solid var(--brd);border-radius:28px;padding:56px;position:relative;overflow:hidden;transition:border-color .55s}
@media(max-width:768px){.calc-wrap{padding:28px 18px;border-radius:18px}}
.calc-wrap::before{content:'';position:absolute;top:-100px;right:-100px;width:360px;height:360px;border-radius:50%;pointer-events:none;background:radial-gradient(circle,color-mix(in srgb,var(--A) 7%,transparent),transparent 70%);transition:background .55s}
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:52px;align-items:center}

<script>
/* ─── GSAP ──────────────────────────────────── */
if(typeof gsap!=='undefined'&&typeof ScrollTrigger!=='undefined') gsap.registerPlugin(ScrollTrigger);

/* ─── ПРОИЗВОДИТЕЛЬНОСТЬ ────────────────────── */
function isFullFX(){
  return !CFG.isMobile || CFG.perfMode==='full';
}
function togglePerf(){
  CFG.perfMode = CFG.perfMode==='lite' ? 'full' : 'lite';
  localStorage.setItem('bio-perf', CFG.perfMode);
  updatePerfToggle();
  if(CFG.perfMode==='full') initHeroCanvas();
  else stopHeroCanvas();
}
function updatePerfToggle(){
  const btn=document.getElementById('perf-toggle');
  const lbl=document.getElementById('perf-label');
  if(!btn||!lbl) return;
  const t=T().perf;
  lbl.textContent = CFG.perfMode==='full' ? t.full : t.lite;
  btn.classList.toggle('fx-on', CFG.perfMode==='full');
}

/* ─── HERO CANVAS ──────────────────────────── */
let heroAnimId=null, heroCtx=null, heroW=0, heroH=0;
let heroParticles=[], mouseMoved=false, mouseTimeout=null;
let mouseX=9999, mouseY=9999;

function getThemeRGBs(){
  const t=CFG.theme;
  if(t==='neural')  return [[0,240,255],[199,36,255],[255,215,0]];
  if(t==='luxury')  return [[255,215,0],[199,36,255],[0,240,255]];
  if(t==='emerald') return [[0,255,136],[0,200,255],[255,215,0]];
  if(t==='indigo')  return [[79,110,247],[155,46,255],[255,107,46]];
  return [[0,240,255],[199,36,255],[255,215,0]];
}

function initHeroCanvas(){
  const canvas=document.getElementById('hero-canvas');
  if(!canvas) return;
  heroW=canvas.width=canvas.parentElement.clientWidth;
  heroH=canvas.height=canvas.parentElement.clientHeight||window.innerHeight;
  heroCtx=canvas.getContext('2d');
  buildHeroParticles();
  if(heroAnimId) cancelAnimationFrame(heroAnimId);
  heroLoop();
}

function stopHeroCanvas(){
  if(heroAnimId){ cancelAnimationFrame(heroAnimId); heroAnimId=null; }
  const canvas=document.getElementById('hero-canvas');
  if(canvas&&heroCtx) heroCtx.clearRect(0,0,heroW,heroH);
}

function buildHeroParticles(){
  heroParticles=[];
  const clrs=getThemeRGBs();
  const N=isFullFX()?55:22;
  for(let i=0;i<N;i++){
    const c=clrs[i%clrs.length];
    heroParticles.push({
      x:Math.random()*heroW,
      y:Math.random()*heroH,
      vx:(Math.random()-.5)*.55,
      vy:(Math.random()-.5)*.55,
      r:1+Math.random()*2.5,
      c,op:0.4+Math.random()*.5,
      ph:Math.random()*Math.PI*2,
      frozen:false,
    });
  }
}

function heroLoop(){
  heroAnimId=requestAnimationFrame(heroLoop);
  const ctx=heroCtx;
  if(!ctx) return;
  ctx.clearRect(0,0,heroW,heroH);
  const t=Date.now()*.001;
  const clrs=getThemeRGBs();
  const CONN=isFullFX()?180:120;

  heroParticles.forEach((p,i)=>{
    // Замирание при неподвижном курсоре
    if(!mouseMoved){
      p.frozen=true;
    } else {
      p.frozen=false;
    }

    if(!p.frozen){
      // Притяжение к курсору
      const dx=mouseX-p.x, dy=mouseY-p.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<200){
        const f=(200-dist)/200*.003;
        p.vx+=dx*f; p.vy+=dy*f;
        p.vx=Math.max(-1.5,Math.min(1.5,p.vx));
        p.vy=Math.max(-1.5,Math.min(1.5,p.vy));
      }
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>heroW) p.vx*=-1;
      if(p.y<0||p.y>heroH) p.vy*=-1;
    }

    p.ph+=0.016;
    const op=p.frozen ? p.op*0.5 : (p.op*(0.6+.4*Math.sin(t+p.ph)));

    // Рисуем частицу
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r*(p.frozen?.8:1),0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${op})`;
    ctx.fill();

    // Свечение
    const grd=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*8);
    grd.addColorStop(0,`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${op*.12})`);
    grd.addColorStop(1,'transparent');
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r*8,0,Math.PI*2);
    ctx.fillStyle=grd;
    ctx.fill();

    // Связи
    for(let j=i+1;j<heroParticles.length;j++){
      const q=heroParticles[j];
      const dx=q.x-p.x,dy=q.y-p.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<CONN){
        const alpha=(1-d/CONN)*(p.frozen?.08:.18)*(0.5+.5*Math.sin(t*.6));
        const cc=clrs[(i+j)%clrs.length];
        ctx.beginPath();
        ctx.moveTo(p.x,p.y);
        ctx.lineTo(q.x,q.y);
        ctx.strokeStyle=`rgba(${cc[0]},${cc[1]},${cc[2]},${alpha})`;
        ctx.lineWidth=1;
        ctx.stroke();
      }
    }
  });
}

// Движение мыши → активируем частицы
document.addEventListener('mousemove',e=>{
  mouseX=e.clientX; mouseY=e.clientY;
  mouseMoved=true;

  mouseTimeout=setTimeout(()=>{ mouseMoved=false; },2000);
},{passive:true});

// Touch
document.addEventListener('touchmove',e=>{
  const t=e.touches[0];
  mouseX=t.clientX; mouseY=t.clientY;
  mouseMoved=true;
  clearTimeout(mouseTimeout);
  mouseTimeout=setTimeout(()=>{ mouseMoved=false; },1500);
},{passive:true});

window.addEventListener('resize',()=>{

/* ─── GSAP ЧИСЛА ────────────────────────────── */
function animNum(el,target,dur=.6,dec=0,pfx='',sfx=''){

    gsap.to({v:0},{v:target,duration:dur,ease:'power2.out',

/* ─── ROI КАЛЬКУЛЯТОР ───────────────────────── */
function calcUp(){
  const txt=T().calc;
  const b=+document.getElementById('sl-b').value;
  const c=+document.getElementById('sl-c').value;
  const v=+document.getElementById('sl-v').value;
  document.getElementById('sv-b').textContent='$'+b.toLocaleString();
  document.getElementById('sv-c').textContent='$'+c.toLocaleString();
  document.getElementById('sv-v').textContent=v.toFixed(1)+'%';
  ['sl-b','sl-c','sl-v'].forEach(id=>fillSlider(document.getElementById(id)));
  const clicks=b/.85, leads=Math.round(clicks*(v/100));
  const improved=Math.round(leads*c*txt.mult);
  const extra=improved-Math.round(leads*c);
  const roas=(improved/b).toFixed(1);
  animNum(document.getElementById('roi-big'),improved,.55,0,'$');
  animNum(document.getElementById('roi-leads'),Math.round(leads*txt.mult),.55,0);
  document.getElementById('roi-roas').textContent=roas+'\u00d7';
  animNum(document.getElementById('roi-extra'),extra,.55,0,'+$');
}
// 3D tilt liquid glass
(()=>{

/* ─── SIMULATOR ЧАСТИЦЫ ─────────────────────── */
let simParticles=[], simAnimId=null;
function simExplode(cb){
  const res=document.getElementById('sim-res');
  const canvas=document.getElementById('sim-particles-canvas');
  if(!res||!canvas) { cb&&cb(); return; }
  const rect=res.getBoundingClientRect();
  const wrap=document.getElementById('sim-res-wrap');
  const wr=wrap.getBoundingClientRect();
  canvas.width=wr.width; canvas.height=wr.height;
  canvas.style.display='block';
  const ctx=canvas.getContext('2d');
  const clrs=getThemeRGBs();
  simParticles=[];
  const N=isFullFX()?60:28;
  for(let i=0;i<N;i++){
    const cx=wr.width/2, cy=wr.height/2;
    const angle=Math.random()*Math.PI*2;
    const spd=2+Math.random()*6;
    const c=clrs[i%clrs.length];
    simParticles.push({x:cx,y:cy,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,r:2+Math.random()*3,op:1,c});
  }
  // Скрываем контент карточки
  if(typeof gsap!=='undefined'){
    gsap.to(res,{opacity:0,scale:.92,duration:.25,ease:'power2.in',onComplete:()=>{res.style.display='none';}});
  } else { res.style.display='none'; }

  cancelAnimationFrame(simAnimId);
  let done=false;
  function loop(){
    simAnimId=requestAnimationFrame(loop);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    simParticles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      p.vy+=.18; p.vx*=.97; p.vy*=.97;
      p.op-=.018;
      if(p.op<=0) return;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${p.op})`;
      ctx.fill();
    });
    if(!done && simParticles.every(p=>p.op<=0)){
      done=true;
      cancelAnimationFrame(simAnimId);
      ctx.clearRect(0,0,canvas.width,canvas.height);
      canvas.style.display='none';
      cb&&cb();
    }
  }
  loop();
}

function simAssemble(el){
  if(typeof gsap!=='undefined'){
    gsap.fromTo(el,{opacity:0,scale:.88,y:20},{opacity:1,scale:1,y:0,duration:.55,ease:'back.out(1.5)'});
  } else { el.style.display='block'; }
}

/* ─── AI СИМУЛЯТОР ──────────────────────────── */
function runSim(preNiche){
  const inp=document.getElementById('sim-inp');
  const niche=preNiche||inp.value.trim();
  if(!niche){ inp.focus(); return; }
  inp.value=niche;

  const anEl=document.getElementById('sim-an');
  const resEl=document.getElementById('sim-res');
  const hasResult=resEl.classList.contains('show');

  anEl.style.display='flex';

  function showResult(){
    const r=T().sim;
    const mets=r.nichemets[niche]||r.nichemets['_default']||r.nichemets[Object.keys(r.nichemets)[0]];
    document.getElementById('sim-tag').textContent='АНАЛИЗ ЗАВЕРШЁН';
    document.getElementById('sim-hl').textContent=(CFG.lang==='ru'?'Стратегия готова':'Strategy ready')+': '+niche;
    document.getElementById('sim-mets').innerHTML=mets.map(m=>`<div class="sim-m"><div class="sim-mv">${m.v}</div><div class="sim-ml fM">${m.l}</div></div>`).join('');
    document.getElementById('sim-ch-lbl').textContent=r.chLbl;
    document.getElementById('sim-chs').innerHTML=r.chs.map(c=>`<span class="chip" style="border-color:color-mix(in srgb,var(--B) 28%,transparent);color:var(--B);">${c}</span>`).join('');
    document.getElementById('sim-desc').textContent=r.desc;
    document.getElementById('sim-cta').textContent=r.ctaAfter;

    resEl.classList.add('show');
    resEl.style.display='block';
    resEl.style.opacity='0';
    simAssemble(resEl);
    if(typeof gsap!=='undefined') gsap.from('.sim-m',{opacity:0,y:14,stagger:.07,duration:.4,ease:'power2.out'});
    resEl.scrollIntoView({behavior:'smooth',block:'nearest'});
  }

  if(hasResult){
    // Разлёт частиц → потом новые данные
    simExplode(()=>{
      setTimeout(()=>{
        anEl.style.display='none';
        showResult();
      }, 200);
    });
    setTimeout(()=>{
      anEl.style.display='none';
      showResult();
    }, 1400);
  } else {
    setTimeout(()=>{
      anEl.style.display='none';
      showResult();
    }, 1350);
  }
}

  // Dashboard
  ScrollTrigger.create({trigger:'#dashboard',start:'top 78%',once:true,onEnter:()=>{
    gsap.from('.dash-cell',{opacity:0,y:22,stagger:.09,duration:.5,ease:'power2.out'});
    setTimeout(()=>{
      document.querySelectorAll('.dash-val').forEach(el=>{

        const pfx=el.dataset.p||'',sfx=el.dataset.s||'';
        gsap.to({v:0},{v:target,duration:1.6,ease:'power2.out',
          onUpdate:function(){const v=this.targets()[0].v;el.textContent=pfx+(flt?v.toFixed(1):Math.round(v).toLocaleString())+sfx;}
        });
      });
      document.querySelectorAll('.sp-bar').forEach((b,i)=>{
        gsap.to(b,{scaleY:1,duration:.75,delay:i*.09,ease:'power2.out'});
      });
    },200);
  }});

  // Cases
  gsap.from('.c-card',{scrollTrigger:{trigger:'#cases',start:'top 80%',once:true},opacity:0,y:50,stagger:.12,duration:.7,ease:'power3.out'});
  // Process
  gsap.from('.proc-item',{scrollTrigger:{trigger:'#process',start:'top 80%',once:true},opacity:0,x:-28,stagger:.09,duration:.6,ease:'power3.out'});
  // Packages
  gsap.from('.pkg-card',{scrollTrigger:{trigger:'#packages',start:'top 80%',once:true},opacity:0,y:42,stagger:.1,duration:.62,ease:'power2.out'});
  // Testimonials
  gsap.from('.t-card',{scrollTrigger:{trigger:'#testimonials',start:'top 80%',once:true},opacity:0,y:36,stagger:.1,duration:.58,ease:'power2.out'});
  // CTA
  gsap.from('.cta-wrap',{scrollTrigger:{trigger:'#cta',start:'top 82%',once:true},opacity:0,y:44,scale:.97,duration:.75,ease:'back.out(1.2)'});

  // Заголовки секций
  document.querySelectorAll('.sec').forEach(sec=>{
    gsap.from(sec.querySelectorAll('.sec-lbl,.sec-h,.sec-p'),{
      scrollTrigger:{trigger:sec,start:'top 82%',once:true},
      opacity:0,y:26,stagger:.12,duration:.62,ease:'power3.out',
    });
  });
}

/* ─── ЖИВЫЕ ЧИСЛА ДАШБОРДА ──────────────────── */
setInterval(()=>{
  const el=document.querySelector('.dash-val[data-f="false"]');
  if(!el) return;
  const cur=parseInt(el.textContent.replace(/\D/g,''))||847;
  const delta=Math.floor(Math.random()*4);
  if(delta>0){
    el.textContent=(el.dataset.p||'')+(cur+delta).toLocaleString()+(el.dataset.s||'');
    if(typeof gsap!=='undefined') gsap.from(el,{scale:1.12,duration:.25,ease:'back.out(2)'});
  }
},3200);

/* ─── ИНИТ ──────────────────────────────────── */
function init(){
  setTheme(CFG.theme);
  ['lb-ru','lb-en','mlb-ru','mlb-en'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.classList.toggle('on',el.id.endsWith(CFG.lang));
  });
  safeRender();
  initSliders();
  // Canvas: на десктопе всегда full, на мобильном — по настройке
  if(isFullFX()) initHeroCanvas();
  setTimeout(initGSAP,250);
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
} else { init(); }
