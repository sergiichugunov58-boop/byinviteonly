<style>
/* ===== CSS ПЕРЕМЕННЫЕ / CSS VARIABLES ===== */
:root {
  --electric: #00F0FF;
  --neon-purple: #C724FF;
  --gold: #FFD700;
  --bg-primary: #020408;
  --bg-secondary: #060c14;
  --bg-card: rgba(10, 20, 35, 0.7);
  --text-primary: #F0F6FF;
  --text-secondary: rgba(180,200,230,0.7);
  --border: rgba(0,240,255,0.12);
  --glass: rgba(0, 240, 255, 0.04);
  --glow-electric: 0 0 40px rgba(0,240,255,0.3);
  --glow-purple: 0 0 40px rgba(199,36,255,0.3);
  --glow-gold: 0 0 30px rgba(255,215,0,0.25);
  --font-display: 'Syne', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --font-body: 'Bricolage Grotesque', sans-serif;
}

[data-theme="light"] {
  --bg-primary: #F0F4FF;
  --bg-secondary: #E4EAF8;
  --bg-card: rgba(255,255,255,0.7);
  --text-primary: #0A0F1E;
  --text-secondary: rgba(20,30,60,0.6);
  --border: rgba(0,180,255,0.2);
  --glass: rgba(0,180,255,0.06);
  --glow-electric: 0 0 30px rgba(0,180,255,0.2);
}

* { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow-x: hidden;
  transition: background 0.4s, color 0.4s;
}

/* ===== ТИПОГРАФИЯ / TYPOGRAPHY ===== */
.font-display { font-family: var(--font-display); }
.font-mono { font-family: var(--font-mono); }

/* ===== ГЛОБАЛЬНЫЕ СТИЛИ / GLOBAL STYLES ===== */
.electric { color: var(--electric); }
.purple { color: var(--neon-purple); }
.gold { color: var(--gold); }

.glow-text-electric {
  text-shadow: 0 0 20px rgba(0,240,255,0.6), 0 0 60px rgba(0,240,255,0.3);
}
.glow-text-purple {
  text-shadow: 0 0 20px rgba(199,36,255,0.6), 0 0 60px rgba(199,36,255,0.3);
}
.glow-text-gold {
  text-shadow: 0 0 20px rgba(255,215,0,0.5), 0 0 50px rgba(255,215,0,0.2);
}

.gradient-text {
  background: linear-gradient(135deg, var(--electric) 0%, var(--neon-purple) 50%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.gradient-text-ep {
  background: linear-gradient(135deg, var(--electric) 0%, var(--neon-purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ===== СТЕКЛЯННЫЕ КАРТОЧКИ / GLASS CARDS ===== */
.glass-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.glass-card:hover {
  border-color: rgba(0,240,255,0.3);
  box-shadow: var(--glow-electric);
  transform: translateY(-4px);
}

/* ===== КНОПКИ / BUTTONS ===== */
.btn-primary {
  background: linear-gradient(135deg, var(--electric), var(--neon-purple));
  color: #fff;
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 16px 36px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.3s;
  text-transform: uppercase;
  font-size: 13px;
}
.btn-primary::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.btn-primary:hover::before { opacity: 1; }
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 40px rgba(0,240,255,0.4), 0 0 80px rgba(199,36,255,0.2);
}

.btn-outline {
  background: transparent;
  color: var(--electric);
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 15px 35px;
  border-radius: 50px;
  border: 1px solid var(--electric);
  cursor: pointer;
  transition: all 0.3s;
  text-transform: uppercase;
  font-size: 13px;
}
.btn-outline:hover {
  background: rgba(0,240,255,0.1);
  box-shadow: var(--glow-electric);
  transform: translateY(-2px);
}

.btn-gold {
  background: linear-gradient(135deg, var(--gold), #FFA500);
  color: #000;
  font-family: var(--font-display);
  font-weight: 800;
  letter-spacing: 0.05em;
  padding: 18px 40px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  transition: all 0.3s;
  text-transform: uppercase;
  font-size: 14px;
}
.btn-gold:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 50px rgba(255,215,0,0.4);
}

/* ===== НЕЙРОННАЯ СЕТЬ / NEURAL CANVAS ===== */
#neural-canvas {
  position: absolute;
  inset: 0;
  z-index: 0;
}

/* ===== НАВБАР / NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 20px 40px;
  transition: all 0.4s;
}
.navbar.scrolled {
  background: rgba(2,4,8,0.85);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  padding: 12px 40px;
}
[data-theme="light"] .navbar.scrolled {
  background: rgba(240,244,255,0.85);
}

.logo-text {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 18px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.logo-dot {
  width: 6px; height: 6px;
  background: var(--electric);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--electric), 0 0 20px var(--electric);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.7); }
}

.lang-toggle {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 6px;
  display: flex;
  gap: 4px;
  cursor: pointer;
}
.lang-btn {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  background: transparent;
  color: var(--text-secondary);
  transition: all 0.3s;
  letter-spacing: 0.05em;
}
.lang-btn.active {
  background: linear-gradient(135deg, var(--electric), var(--neon-purple));
  color: #fff;
}

.theme-toggle {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--glass);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all 0.3s;
  backdrop-filter: blur(10px);
}
.theme-toggle:hover {
  border-color: var(--electric);
  box-shadow: var(--glow-electric);
}

/* ===== HERO СЕКЦИЯ / HERO SECTION ===== */
#hero {
  min-height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.hero-bg {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(0,240,255,0.06) 0%, transparent 70%),
              radial-gradient(ellipse 60% 50% at 80% 20%, rgba(199,36,255,0.08) 0%, transparent 60%),
              radial-gradient(ellipse 50% 40% at 20% 80%, rgba(255,215,0,0.04) 0%, transparent 60%);
}
[data-theme="light"] .hero-bg {
  background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(0,180,255,0.08) 0%, transparent 70%),
              radial-gradient(ellipse 60% 50% at 80% 20%, rgba(199,36,255,0.06) 0%, transparent 60%);
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,240,255,0.08);
  border: 1px solid rgba(0,240,255,0.25);
  border-radius: 50px;
  padding: 8px 20px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--electric);
  margin-bottom: 32px;
  animation: badge-glow 3s ease-in-out infinite;
}
@keyframes badge-glow {
  0%,100% { box-shadow: 0 0 15px rgba(0,240,255,0.2); }
  50% { box-shadow: 0 0 30px rgba(0,240,255,0.4), 0 0 60px rgba(0,240,255,0.1); }
}
.badge-dot {
  width: 6px; height: 6px;
  background: var(--electric);
  border-radius: 50%;
  animation: pulse-dot 1.5s ease-in-out infinite;
}

.hero-title {
  font-family: var(--font-display);
  font-size: clamp(42px, 7vw, 90px);
  font-weight: 800;
  line-height: 1.0;
  letter-spacing: -0.02em;
  margin-bottom: 24px;
}

.hero-subtitle {
  font-size: clamp(16px, 2vw, 20px);
  color: var(--text-secondary);
  max-width: 580px;
  margin: 0 auto 48px;
  line-height: 1.7;
  font-weight: 300;
}

.hero-stats {
  display: flex;
  gap: 48px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 60px;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 4px;
}
.stat-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-secondary);
}

/* ===== АНИМАЦИИ ПОЯВЛЕНИЯ / FADE-IN ANIMATIONS ===== */
.fade-up {
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1), transform 0.8s cubic-bezier(0.4,0,0.2,1);
}
.fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}
.fade-up:nth-child(2) { transition-delay: 0.1s; }
.fade-up:nth-child(3) { transition-delay: 0.2s; }
.fade-up:nth-child(4) { transition-delay: 0.3s; }

/* ===== СЕКЦИИ / SECTIONS ===== */
.section {
  padding: 120px 0;
  position: relative;
}
.section-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--electric);
  margin-bottom: 16px;
}
.section-title {
  font-family: var(--font-display);
  font-size: clamp(32px, 5vw, 60px);
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin-bottom: 20px;
}
.section-subtitle {
  font-size: 18px;
  color: var(--text-secondary);
  max-width: 600px;
  line-height: 1.7;
  font-weight: 300;
}

/* ===== GROWTH OS СХЕМА / GROWTH OS DIAGRAM ===== */
.os-flow {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 4px;
  position: relative;
}
.os-node {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px;
  text-align: center;
  position: relative;
  transition: all 0.4s;
  cursor: default;
  backdrop-filter: blur(20px);
}
.os-node:hover {
  border-color: var(--electric);
  box-shadow: 0 0 30px rgba(0,240,255,0.2);
  transform: translateY(-6px);
}
.os-node.active {
  border-color: var(--electric);
  box-shadow: 0 0 20px rgba(0,240,255,0.3);
}
.os-icon {
  width: 56px; height: 56px;
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  margin: 0 auto 16px;
}
.os-arrow {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--electric);
  font-size: 20px;
  animation: arrow-pulse 2s ease-in-out infinite;
}
@keyframes arrow-pulse {
  0%,100% { opacity: 0.4; transform: translateX(0); }
  50% { opacity: 1; transform: translateX(4px); }
}

/* ===== ДАШБОРД / DASHBOARD ===== */
.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
@media (min-width: 768px) {
  .dashboard-grid { grid-template-columns: repeat(4, 1fr); }
}
.dash-metric {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
}
.dash-metric::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--electric), var(--neon-purple));
}
.metric-value {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 4px;
}
.metric-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-secondary);
}
.metric-delta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: #00FF88;
  margin-top: 8px;
}

/* ===== МИНИ БАР-ГРАФИК / MINI BAR CHART ===== */
.mini-chart {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 40px;
  margin-top: 12px;
}
.bar {
  flex: 1;
  border-radius: 3px 3px 0 0;
  opacity: 0.7;
  transition: opacity 0.3s;
  background: linear-gradient(to top, var(--electric), var(--neon-purple));
  animation: bar-grow 1s cubic-bezier(0.4,0,0.2,1) forwards;
  transform-origin: bottom;
  transform: scaleY(0);
}
@keyframes bar-grow {
  to { transform: scaleY(1); }
}

/* ===== КАЛЬКУЛЯТОР ROI / ROI CALCULATOR ===== */
.calculator-section {
  background: linear-gradient(135deg, rgba(0,240,255,0.03), rgba(199,36,255,0.03));
  border-radius: 32px;
  border: 1px solid var(--border);
  padding: 60px;
}
@media (max-width: 768px) {
  .calculator-section { padding: 32px 20px; }
}
.calc-slider {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: var(--border);
  outline: none;
  cursor: pointer;
}
.calc-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--electric), var(--neon-purple));
  cursor: pointer;
  box-shadow: 0 0 10px rgba(0,240,255,0.5);
}
.calc-result-box {
  background: linear-gradient(135deg, rgba(0,240,255,0.1), rgba(199,36,255,0.1));
  border: 1px solid rgba(0,240,255,0.3);
  border-radius: 24px;
  padding: 40px;
  text-align: center;
}
.result-big {
  font-family: var(--font-display);
  font-size: clamp(48px, 7vw, 80px);
  font-weight: 800;
  line-height: 1;
  margin: 12px 0;
}

/* ===== AI СИМУЛЯТОР / AI SIMULATOR ===== */
.simulator-input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 24px;
  font-family: var(--font-body);
  font-size: 16px;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.3s;
}
.simulator-input:focus {
  border-color: var(--electric);
  box-shadow: 0 0 20px rgba(0,240,255,0.15);
}
.simulator-result {
  display: none;
  background: var(--bg-card);
  border: 1px solid rgba(0,240,255,0.3);
  border-radius: 20px;
  padding: 32px;
  margin-top: 24px;
  animation: fadeIn 0.5s ease;
}
.simulator-result.show { display: block; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== КЕЙСЫ / CASES ===== */
.case-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 24px;
  overflow: hidden;
  backdrop-filter: blur(20px);
  transition: all 0.4s;
}
.case-card:hover {
  border-color: rgba(199,36,255,0.4);
  box-shadow: 0 0 40px rgba(199,36,255,0.15);
  transform: translateY(-6px);
}
.case-before-after {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 16px;
  align-items: center;
}
.case-metric-box {
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}
.before-box { background: rgba(255,50,50,0.08); border: 1px solid rgba(255,50,50,0.2); }
.after-box { background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.2); }
.arrow-box {
  font-size: 24px;
  color: var(--electric);
}

/* ===== ПРОЦЕСС / PROCESS ===== */
.process-step {
  display: flex;
  gap: 32px;
  align-items: flex-start;
  padding: 32px;
  border-radius: 20px;
  border: 1px solid transparent;
  transition: all 0.4s;
}
.process-step:hover {
  background: var(--bg-card);
  border-color: var(--border);
}
.step-num {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 800;
  line-height: 1;
  min-width: 60px;
  background: linear-gradient(135deg, var(--electric), var(--neon-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ===== ПАКЕТЫ / PACKAGES ===== */
.package-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 48px 36px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(20px);
  transition: all 0.4s;
}
.package-card:hover { transform: translateY(-8px); }
.package-card.featured {
  border-color: var(--electric);
  box-shadow: 0 0 40px rgba(0,240,255,0.2), inset 0 0 40px rgba(0,240,255,0.02);
}
.package-badge {
  position: absolute;
  top: 20px; right: 20px;
  background: linear-gradient(135deg, var(--electric), var(--neon-purple));
  color: #fff;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 50px;
}
.price-big {
  font-family: var(--font-display);
  font-size: 52px;
  font-weight: 800;
  line-height: 1;
}
.feature-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 14px;
  color: var(--text-secondary);
}
.feature-check { color: var(--electric); font-size: 16px; flex-shrink: 0; }

/* ===== ОТЗЫВЫ / TESTIMONIALS ===== */
.testimonial-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px;

<script>
// ==========================================
// НЕЙРОННАЯ СЕТЬ / NEURAL NETWORK CANVAS
// ==========================================
(function() {
  const canvas = document.getElementById('neural-canvas');
  const ctx = canvas.getContext('2d');
  let nodes = [], animFrame;
  const isDark = () => CONFIG.currentTheme === 'dark';

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function createNodes() {
    nodes = [];
    const count = Math.min(Math.floor(window.innerWidth / 60), 28);
    for (let i = 0; i < count; i++) {
      nodes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: Math.random() * 3 + 1,
        pulse: Math.random() * Math.PI * 2,
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const dark = isDark();
    const time = Date.now() * 0.001;

    // Обновляем позиции
    nodes.forEach(n => {
      n.x += n.vx;
      n.y += n.vy;
      n.pulse += 0.02;
      if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
      if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
    });

    // Рисуем связи
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[j].x - nodes[i].x;
        const dy = nodes[j].y - nodes[i].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const maxDist = 200;
        if (dist < maxDist) {
          const alpha = (1 - dist / maxDist) * (dark ? 0.25 : 0.15);
          const pulse = Math.sin(time + nodes[i].pulse) * 0.5 + 0.5;
          // Чередуем цвета
          const r = i % 3;
          let color;
          if (r === 0) color = `rgba(0,240,255,${alpha * pulse})`;
          else if (r === 1) color = `rgba(199,36,255,${alpha * pulse})`;
          else color = `rgba(255,215,0,${alpha * 0.5 * pulse})`;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.strokeStyle = color;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }
    }

    // Рисуем узлы
    nodes.forEach((n, i) => {
      const pulse = Math.sin(n.pulse) * 0.5 + 0.5;
      const r = i % 3;
      let color;
      if (r === 0) color = `rgba(0,240,255,${(dark ? 0.7 : 0.5) * pulse})`;
      else if (r === 1) color = `rgba(199,36,255,${(dark ? 0.7 : 0.5) * pulse})`;
      else color = `rgba(255,215,0,${(dark ? 0.5 : 0.3) * pulse})`;

      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r * (1 + pulse * 0.5), 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();

      // Свечение
      const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r * 8);
      grd.addColorStop(0, color.replace(/[\d.]+\)$/, `${0.15 * pulse})`));
      grd.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r * 8, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    });

    animFrame = requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); createNodes(); });
  resize();
  createNodes();
  draw();
})();

// ==========================================
// КАЛЬКУЛЯТОР ROI / ROI CALCULATOR
// ==========================================
function updateCalc() {
  const budget = parseFloat(document.getElementById('budgetSlider').value);
  const check = parseFloat(document.getElementById('checkSlider').value);
  const conv = parseFloat(document.getElementById('convSlider').value);
  const txt = t();

  document.getElementById('budgetVal').textContent = '$' + budget.toLocaleString();
  document.getElementById('checkVal').textContent = '$' + check.toLocaleString();
  document.getElementById('convVal').textContent = conv.toFixed(1) + '%';

  // Базовый результат
  const clicks = (budget / 0.8);
  const leads = Math.round(clicks * (conv / 100));
  const baseRevenue = leads * check;
  // С улучшением BIO
  const improvedRevenue = baseRevenue * txt.calculator.multiplier;
  const extra = improvedRevenue - baseRevenue;
  const roas = (improvedRevenue / budget).toFixed(1);

  document.getElementById('calcResult').textContent = '$' + Math.round(improvedRevenue).toLocaleString();
  document.getElementById('calcLeads').textContent = Math.round(leads * txt.calculator.multiplier).toLocaleString();
  document.getElementById('calcRoas').textContent = roas + '×';
  document.getElementById('calcExtra').textContent = '+$' + Math.round(extra).toLocaleString();
}

function runSimulator() {
  const input = document.getElementById('simInput').value.trim();
  if (!input) return;
  const txt = t().simulator.results.default;

  // Анимация загрузки
  const btn = document.getElementById('simBtn');
  btn.textContent = '⏳';
  btn.disabled = true;

  setTimeout(() => {
    btn.textContent = t().simulator.btnText;
    btn.disabled = false;

    const result = document.getElementById('simResult');
    result.classList.add('show');

    document.getElementById('simTag').textContent = txt.tag;
    document.getElementById('simHeadline').textContent = txt.headline + ': ' + input;

    // Метрики
    const metricsEl = document.getElementById('simMetrics');
    metricsEl.innerHTML = '';
    txt.metrics.forEach(m => {
      metricsEl.innerHTML += `
        <div style="background:rgba(0,240,255,0.06);border:1px solid rgba(0,240,255,0.15);border-radius:12px;padding:16px;text-align:center;">
          <div style="font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--electric);">${m.val}</div>
          <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-secondary);margin-top:4px;">${m.label}</div>
        </div>`;
    });

    // Каналы
    const channelsEl = document.getElementById('simChannels');
    channelsEl.innerHTML = '';
    txt.channels.forEach(c => {
      channelsEl.innerHTML += `<span class="tag" style="background:rgba(199,36,255,0.1);border-color:rgba(199,36,255,0.25);color:var(--neon-purple);">${c}</span>`;
    });

    document.getElementById('simDesc').textContent = txt.desc;
    document.getElementById('simCtaText').textContent = t().simulator.ctaAfter;
    document.getElementById('simCtaBtn').textContent = t().simulator.ctaAfter;

    result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 1200);
}

function submitForm() {
  const name = document.getElementById('fieldName').value.trim();
  const phone = document.getElementById('fieldPhone').value.trim();
  const niche = document.getElementById('fieldNiche').value.trim();

  if (!name || !phone || !niche) {
    // Подсветка пустых полей
    [['fieldName', name], ['fieldPhone', phone], ['fieldNiche', niche]].forEach(([id, val]) => {
      if (!val) {
        const el = document.getElementById(id);
        el.style.borderColor = '#FF4444';
        setTimeout(() => el.style.borderColor = '', 2000);
      }
    });
    return;
  }

  // Имитируем отправку
  const btn = document.getElementById('submitBtn');
  btn.textContent = '⏳ ...';
  btn.disabled = true;

  setTimeout(() => {
    document.getElementById('contactForm').style.display = 'none';
    document.getElementById('directContactWrap').style.display = 'none';
    document.getElementById('thankYou').classList.add('show');

    const txt = t();
    document.getElementById('thankYouTitle').textContent = txt.cta.thankYouTitle;
    document.getElementById('thankYouText').textContent = txt.cta.thankYouText;

    // Ссылки
    const waMsg = encodeURIComponent(`Привет! Меня зовут ${name}. Хочу узнать о системе By Invite Only. Ниша: ${niche}`);
    document.getElementById('waLink').href = `https://wa.me/${CONFIG.contacts.whatsapp.replace('+', '')}?text=${waMsg}`;
    document.getElementById('tgLink').href = `https://t.me/${CONFIG.contacts.telegram.replace('@', '')}`;
  }, 1500);
}

// ==========================================
// АНИМАЦИИ ПРИ СКРОЛЛЕ / SCROLL ANIMATIONS
// ==========================================
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
    }
  });
}, { threshold: 0.1 });

// ==========================================
// АНИМАЦИЯ ЦИФР / NUMBER ANIMATION
// ==========================================
function animateNumber(el, target, duration = 2000, isFloat = false, prefix = '', suffix = '') {
  const start = Date.now();
  const startVal = 0;
  const update = () => {
    const elapsed = Date.now() - start;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = startVal + (target - startVal) * eased;
    el.textContent = prefix + (isFloat ? current.toFixed(1) : Math.round(current).toLocaleString()) + suffix;
    if (progress < 1) requestAnimationFrame(update);
  };
  update();
}

// ==========================================
// ГЛОБАЛЬНЫЙ ПЕРЕХВАТЧИК ОШИБОК / GLOBAL ERROR HANDLER
// ==========================================
window.addEventListener('error', (e) => {
  console.error('JS Error:', e.message, 'at', e.filename, 'line', e.lineno);
});
window.addEventListener('unhandledrejection', (e) => {
  console.error('Unhandled Promise rejection:', e.reason);
});

// ==========================================
// БЕЗОПАСНЫЙ РЕНДЕР / SAFE RENDER WRAPPER
// ==========================================
function safeRenderAll() {
  try {
    renderAll();
  } catch (err) {
    console.error('renderAll() failed:', err);
    // Показываем fallback чтобы страница не была пустой
    document.body.style.opacity = '1';
    const fallback = document.getElementById('hero');
    if (fallback) {
      fallback.style.display = 'flex';
      fallback.style.alignItems = 'center';
      fallback.style.justifyContent = 'center';
    }
  }
}

// ==========================================
// АДАПТИВНЫЙ БУРГЕР / RESPONSIVE BURGER
// ==========================================
function checkMobile() {
  const burgerBtn = document.getElementById('burgerBtn');
  if (!burgerBtn) return;
  burgerBtn.style.display = window.innerWidth < 768 ? 'block' : 'none';
}
window.addEventListener('resize', checkMobile);

// ==========================================
// ИНИЦИАЛИЗАЦИЯ / INITIALIZATION
// ==========================================
function init() {
  try {
    // Инициализация языка
    const btnRu = document.getElementById('btnRu');
    const btnEn = document.getElementById('btnEn');
    if (btnRu) btnRu.classList.toggle('active', CONFIG.currentLang === 'ru');
    if (btnEn) btnEn.classList.toggle('active', CONFIG.currentLang === 'en');

    // Рендер
    safeRenderAll();
    checkMobile();

    // Плавное появление hero-элементов
    setTimeout(() => {
      document.querySelectorAll('#hero .fade-up').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), i * 150);
      });
    }, 300);
  } catch (err) {
    console.error('init() failed:', err);
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  // DOM уже готов (скрипт выполняется после парсинга)
  init();
}

// ==========================================
// ЖИВЫЕ ЦИФРЫ В ДАШБОРДЕ (обновление)
// ==========================================
setInterval(() => {
  // Имитируем живые данные
  const metricEls = document.querySelectorAll('.metric-value');
  if (metricEls.length > 0) {
    const firstEl = metricEls[0];
    const current = parseInt(firstEl.textContent.replace(/\D/g, '')) || 847;
    const delta = Math.floor(Math.random() * 5) - 1;
    if (delta > 0) {
      const newVal = current + delta;
      firstEl.textContent = newVal.toLocaleString();
      firstEl.style.transform = 'scale(1.05)';
      setTimeout(() => firstEl.style.transform = '', 300);
    }
  }
}, 3000);
</script>
