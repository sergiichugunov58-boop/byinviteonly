<style>
/* ═══════════════════════════════════════════════════
   ЦВЕТОВЫЕ ТЕМЫ (4 варианта) — меняй цвета здесь
═══════════════════════════════════════════════════ */
[data-theme="neural"]{
  --A:#00F0FF;--B:#C724FF;--C:#FFD700;
  --bg:#030609;--bg2:#06101c;
  --card:rgba(6,16,30,.87);
  --txt:#EEF4FF;--txt2:rgba(150,185,230,.68);
  --brd:rgba(0,240,255,.1);
  --gA:0 0 44px rgba(0,240,255,.22);
  --gB:0 0 44px rgba(199,36,255,.22);
  --gC:0 0 36px rgba(255,215,0,.18);
}
[data-theme="luxury"]{
  --A:#FFD700;--B:#C724FF;--C:#00F0FF;
  --bg:#050306;--bg2:#0d0810;
  --card:rgba(14,8,20,.90);
  --txt:#FFF8E6;--txt2:rgba(210,190,155,.70);
  --brd:rgba(255,215,0,.11);
  --gA:0 0 44px rgba(255,215,0,.20);
  --gB:0 0 44px rgba(199,36,255,.20);
  --gC:0 0 36px rgba(0,240,255,.14);
}
[data-theme="emerald"]{
  --A:#00FF88;--B:#00C8FF;--C:#FFD700;
  --bg:#020b06;--bg2:#04140a;
  --card:rgba(4,14,8,.90);
  --txt:#E6FFF4;--txt2:rgba(130,200,165,.70);
  --brd:rgba(0,255,136,.1);
  --gA:0 0 44px rgba(0,255,136,.20);
  --gB:0 0 44px rgba(0,200,255,.20);
  --gC:0 0 36px rgba(255,215,0,.14);
}
[data-theme="indigo"]{
  --A:#4F6EF7;--B:#9B2EFF;--C:#FF6B2E;
  --bg:#F2F5FF;--bg2:#E6EAFF;
  --card:rgba(255,255,255,.92);
  --txt:#0C1030;--txt2:rgba(28,38,100,.60);
  --brd:rgba(79,110,247,.16);
  --gA:0 6px 36px rgba(79,110,247,.16);
  --gB:0 6px 36px rgba(155,46,255,.14);
  --gC:0 6px 36px rgba(255,107,46,.14);
}

/* ═══════════════════════════════════════════════════
   БАЗОВЫЕ СТИЛИ
═══════════════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);color:var(--txt);
  overflow-x:hidden;line-height:1.6;
  transition:background .55s cubic-bezier(.4,0,.2,1),color .55s cubic-bezier(.4,0,.2,1);
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--A),var(--B));border-radius:3px}
::selection{background:color-mix(in srgb,var(--A) 25%,transparent);color:var(--txt)}

/* Типографика */
.fD{font-family:'Space Grotesk',sans-serif}
.fM{font-family:'JetBrains Mono',monospace}
.g-ab{background:linear-gradient(135deg,var(--A),var(--B));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-abc{background:linear-gradient(135deg,var(--A),var(--B) 50%,var(--C));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.glow-a{text-shadow:0 0 24px color-mix(in srgb,var(--A) 55%,transparent),0 0 60px color-mix(in srgb,var(--A) 20%,transparent)}
.ca{color:var(--A)}.cb{color:var(--B)}.cc{color:var(--C)}

/* Layout */
.wrap{max-width:1200px;margin:0 auto;padding:0 40px}
@media(max-width:768px){.wrap{padding:0 18px}}
.sec{padding:120px 0}
@media(max-width:768px){.sec{padding:72px 0}}
.sec-lbl{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--A);margin-bottom:14px;transition:color .55s}
.sec-h{font-family:'Space Grotesk',sans-serif;font-weight:700;line-height:1.08;letter-spacing:-.025em;margin-bottom:18px;font-size:clamp(28px,5vw,56px);transition:color .55s}
/* Исправление: явный цвет текста для заголовков — нет полупрозрачности */
.sec-h,.sec-p,.sec-lbl{color:var(--txt)}
.sec-h.g-ab{color:transparent} /* градиентные заголовки — ок */
.sec-p{font-size:clamp(14px,1.8vw,17px);color:var(--txt2);line-height:1.78;font-weight:300;transition:color .55s}

/* Кнопки */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Space Grotesk',sans-serif;font-weight:600;letter-spacing:.05em;text-transform:uppercase;font-size:11px;border-radius:100px;border:none;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);text-decoration:none;white-space:nowrap;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;min-height:44px;padding:14px 30px}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.14),transparent);opacity:0;transition:opacity .3s}
.btn:hover::before{opacity:1}
.btn-p{background:linear-gradient(135deg,var(--A),var(--B));color:#fff;box-shadow:0 4px 24px color-mix(in srgb,var(--A) 28%,transparent)}
.btn-p:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 10px 40px color-mix(in srgb,var(--A) 38%,transparent)}
.btn-p:active{transform:translateY(0) scale(.98)}
.btn-g{background:color-mix(in srgb,var(--A) 6%,transparent);color:var(--A);border:1px solid var(--brd)}
.btn-g:hover{background:color-mix(in srgb,var(--A) 12%,transparent);border-color:color-mix(in srgb,var(--A) 45%,transparent);box-shadow:var(--gA);transform:translateY(-2px)}
.btn-gold{background:linear-gradient(135deg,var(--C),color-mix(in srgb,var(--C) 65%,#e06000));color:#05030a;font-weight:700}
.btn-gold:hover{transform:translateY(-3px);box-shadow:var(--gC)}

/* Live chip */
.live-chip{display:inline-flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:#00FF88}
.live-dot{width:7px;height:7px;border-radius:50%;background:#00FF88;animation:lp 1.7s ease-in-out infinite;flex-shrink:0}
@keyframes lp{0%{box-shadow:0 0 0 0 rgba(0,255,136,.55)}70%{box-shadow:0 0 0 9px rgba(0,255,136,0)}100%{box-shadow:0 0 0 0 rgba(0,255,136,0)}}

/* Chip/Tag */
.chip{display:inline-flex;align-items:center;background:color-mix(in srgb,var(--A) 6%,transparent);border:1px solid var(--brd);border-radius:100px;padding:6px 15px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txt2);white-space:nowrap;transition:all .28s;cursor:default;min-height:34px}
.chip:hover{border-color:color-mix(in srgb,var(--A) 40%,transparent);color:var(--A)}

/* ═══════════════════════════════════════════════════
   NAVBAR — прозрачный на hero, glass при скролле
═══════════════════════════════════════════════════ */
#nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  /* На hero — полностью прозрачный */
  background:transparent;
  border-bottom:1px solid transparent;
  backdrop-filter:none;-webkit-backdrop-filter:none;
  padding:16px 32px;
  transition:background .45s cubic-bezier(.4,0,.2,1),
             border-color .45s,
             backdrop-filter .45s,
             padding .45s;
}
/* Glass-эффект при скролле — остаётся на всех секциях */
#nav.scrolled{
  background:color-mix(in srgb,var(--bg) 86%,transparent);
  backdrop-filter:blur(28px) saturate(1.5);
  -webkit-backdrop-filter:blur(28px) saturate(1.5);
  border-bottom:1px solid var(--brd);
  padding:10px 32px;
}
@media(max-width:768px){
  #nav{padding:13px 18px}
  #nav.scrolled{padding:9px 18px}
}
/* Компактный и узкий контейнер */
.nav-in{
  max-width:1100px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0}
.logo-led{width:7px;height:7px;border-radius:50%;background:var(--A);box-shadow:0 0 8px var(--A),0 0 16px color-mix(in srgb,var(--A) 50%,transparent);animation:led 2.5s ease-in-out infinite;flex-shrink:0;transition:background .55s,box-shadow .55s}
@keyframes led{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.62)}}
.logo-txt{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;letter-spacing:.14em;text-transform:uppercase;color:var(--txt);transition:color .55s}

/* Строго горизонтальное меню на десктопе */
#nav-links{
  display:flex;flex-direction:row;align-items:center;
  gap:28px;list-style:none;flex:1;justify-content:center;
}
@media(max-width:900px){#nav-links{display:none!important}}
.nav-a{
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:500;
  letter-spacing:.08em;text-transform:uppercase;color:var(--txt2);
  text-decoration:none;position:relative;padding:4px 0;
  transition:color .28s;white-space:nowrap;
}
.nav-a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;background:var(--A);transition:width .3s cubic-bezier(.4,0,.2,1)}
.nav-a:hover{color:var(--A)}.nav-a:hover::after{width:100%}
.nav-ctrl{display:flex;align-items:center;gap:7px;flex-shrink:0}
.theme-sw{display:flex;align-items:center;gap:5px;background:color-mix(in srgb,var(--A) 5%,transparent);border:1px solid var(--brd);border-radius:100px;padding:5px 7px;transition:all .55s}
.td{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .28s;flex-shrink:0;background:none;padding:0}
.td:hover{transform:scale(1.25)}.td.on{border-color:var(--txt);transform:scale(1.15)}
.td[data-t="neural"]{background:linear-gradient(135deg,#00F0FF,#C724FF)}
.td[data-t="luxury"]{background:linear-gradient(135deg,#FFD700,#C724FF)}
.td[data-t="emerald"]{background:linear-gradient(135deg,#00FF88,#00C8FF)}
.td[data-t="indigo"]{background:linear-gradient(135deg,#4F6EF7,#9B2EFF)}
.lang-sw{display:flex;background:color-mix(in srgb,var(--A) 5%,transparent);border:1px solid var(--brd);border-radius:100px;padding:3px;gap:2px;transition:all .55s}
.lb{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.1em;padding:5px 10px;border-radius:100px;border:none;cursor:pointer;background:transparent;color:var(--txt2);transition:all .28s;min-height:30px;display:flex;align-items:center}
.lb.on{background:linear-gradient(135deg,var(--A),var(--B));color:#fff}
#nav-cta{display:none;padding:8px 16px;font-size:10px}
@media(min-width:900px){#nav-cta{display:inline-flex}}
#burger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:6px;min-width:44px;min-height:44px;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
#burger span{display:block;width:22px;height:2px;background:var(--txt);border-radius:2px;transition:all .32s cubic-bezier(.4,0,.2,1)}
@media(max-width:900px){#burger{display:flex}}
#burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
#burger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
#burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* Мобильное меню — премиальный вид */
#mob-menu{
  display:none;position:fixed;inset:0;z-index:490;
  background:color-mix(in srgb,var(--bg) 95%,transparent);
  backdrop-filter:blur(48px) saturate(1.4);
  -webkit-backdrop-filter:blur(48px) saturate(1.4);
  flex-direction:column;align-items:center;justify-content:center;gap:4px;
  transition:background .55s;
}
#mob-menu::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--A) 40%,var(--B) 60%,transparent)}
#mob-menu::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--B) 40%,var(--A) 60%,transparent)}
#mob-menu.open{display:flex}
.mob-a{
  font-family:'Space Grotesk',sans-serif;font-size:clamp(22px,6vw,36px);font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;color:var(--txt);text-decoration:none;
  transition:color .28s,transform .28s;padding:10px 36px;border-radius:16px;
  position:relative;-webkit-tap-highlight-color:transparent;
}
.mob-a:hover{color:var(--A);transform:translateX(8px)}
.mob-a-num{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--txt2);letter-spacing:.12em;margin-right:8px;vertical-align:middle;opacity:.7}
#mob-bottom-row{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--brd);width:220px}
#perf-btn{display:none;align-items:center;gap:9px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt2);background:color-mix(in srgb,var(--A) 5%,transparent);border:1px solid var(--brd);border-radius:100px;padding:9px 16px;transition:all .3s;-webkit-tap-highlight-color:transparent}
@media(max-width:900px){#perf-btn{display:inline-flex}}
#perf-btn:hover{border-color:var(--A);color:var(--A)}
.pb-dot{width:8px;height:8px;border-radius:50%;transition:all .3s;flex-shrink:0}

/* ═══════════════════════════════════════════════════
   HERO
═══════════════════════════════════════════════════ */
#hero{min-height:100svh;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:100px 20px 60px}
#hero-canvas{position:absolute;inset:0;z-index:0;pointer-events:none;width:100%;height:100%}
.hero-glow{position:absolute;inset:0;pointer-events:none;z-index:1;background:radial-gradient(ellipse 80% 60% at 50% 44%,color-mix(in srgb,var(--A) 7%,transparent),transparent 70%),radial-gradient(ellipse 55% 42% at 85% 15%,color-mix(in srgb,var(--B) 8%,transparent),transparent 60%),radial-gradient(ellipse 45% 38% at 12% 85%,color-mix(in srgb,var(--C) 5%,transparent),transparent 58%);transition:all .55s}
.hero-content{position:relative;z-index:2;text-align:center;width:100%;max-width:980px}
.hero-badge{display:inline-flex;align-items:center;gap:9px;background:color-mix(in srgb,var(--A) 8%,transparent);border:1px solid color-mix(in srgb,var(--A) 24%,transparent);border-radius:100px;padding:9px 22px;margin-bottom:34px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--A);animation:bglow 3.5s ease-in-out infinite;transition:all .55s}
@keyframes bglow{0%,100%{box-shadow:0 0 14px color-mix(in srgb,var(--A) 18%,transparent)}50%{box-shadow:0 0 32px color-mix(in srgb,var(--A) 34%,transparent),0 0 70px color-mix(in srgb,var(--A) 10%,transparent)}}
.badge-led{width:6px;height:6px;border-radius:50%;background:var(--A);animation:led 1.6s ease-in-out infinite;flex-shrink:0}

/* Заголовок hero — поддержка эффекта scramble */
.hero-h{font-family:'Space Grotesk',sans-serif;font-weight:700;line-height:.95;letter-spacing:-.032em;margin-bottom:26px;font-size:clamp(40px,9vw,98px);cursor:default}
/* Отдельные буквы для scramble-эффекта */
.hero-h .hero-char{
  display:inline-block;
  transition:transform .15s ease,color .1s ease;
}
.hero-h .hero-char.scrambling{
  color:var(--A);
  animation:charGlow .1s ease-in-out;
}
@keyframes charGlow{0%,100%{text-shadow:none}50%{text-shadow:0 0 12px var(--A)}}

.hero-sub{font-size:clamp(14px,2vw,19px);color:var(--txt2);max-width:560px;margin:0 auto 48px;line-height:1.76;font-weight:300;transition:color .55s}
.hero-stats{display:flex;gap:clamp(24px,5vw,56px);justify-content:center;flex-wrap:wrap;margin-bottom:52px}
.hs-n{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(28px,5vw,42px);line-height:1;margin-bottom:5px}
.hs-l{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--txt2);transition:color .55s}
.tags-row{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin-top:30px}
.scroll-ind{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:7px;opacity:.38}
.scroll-txt{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--txt2)}
.scroll-line{width:1px;height:42px;background:linear-gradient(to bottom,var(--A),transparent);animation:scb 2.4s ease-in-out infinite;transition:background .55s}
@keyframes scb{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}

/* ═══════════════════════════════════════════════════
   GROWTH OS — большие карточки, горизонталь, связи
═══════════════════════════════════════════════════ */
/* Обёртка для SVG-связей между карточками */
.os-wrapper{position:relative;width:100%}
#os-neural-svg{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;overflow:visible;
}
#os-track{
  display:flex;flex-direction:row;
  flex-wrap:nowrap;gap:0;
  justify-content:stretch;align-items:stretch;
  position:relative;z-index:1;
  overflow-x:auto;
  padding-bottom:4px;/* для скролла на мобильных */
}
/* Убираем scrollbar на мобильных */
#os-track::-webkit-scrollbar{height:0}

/* Карточка OS — заметно больше */
.os-node{
  position:relative;cursor:pointer;
  display:flex;align-items:center;flex-direction:column;
  flex:1;min-width:160px;
  padding:32px 20px 28px;
  background:var(--card);
  border:1px solid var(--brd);
  border-radius:0;
  transition:background .38s,border-color .38s,z-index 0s;
  /* Убираем border-radius у соседей — сохраняем только крайним */
}
.os-node:first-child{border-radius:18px 0 0 18px}
.os-node:last-child{border-radius:0 18px 18px 0}
/* Убираем дублирующие бордеры */
.os-node+.os-node{border-left:none}
/* Пульсирующая нейронная связь — вертикальная линия между карточками */
.os-node:not(:last-child)::after{
  content:'';position:absolute;
  top:50%;right:-1px;
  width:2px;height:60%;
  transform:translateY(-50%);
  background:linear-gradient(to bottom,transparent,var(--A),var(--B),var(--A),transparent);
  animation:neuralPulse 2.5s ease-in-out infinite;
  z-index:2;
}
@keyframes neuralPulse{
  0%,100%{opacity:.25;box-shadow:none}
  50%{opacity:.85;box-shadow:0 0 8px var(--A),0 0 16px color-mix(in srgb,var(--A) 30%,transparent)}
}

.os-node:hover{
  background:color-mix(in srgb,var(--A) 5%,var(--card));
  border-color:color-mix(in srgb,var(--A) 42%,transparent);
  z-index:2;
}
.os-ico-wrap{
  width:88px;height:88px;border-radius:24px;
  display:flex;align-items:center;justify-content:center;
  background:color-mix(in srgb,var(--A) 8%,transparent);
  border:1px solid var(--brd);
  transition:all .38s;
  margin-bottom:16px;
}
.os-ico-wrap svg{width:44px;height:44px;transition:all .4s}
.os-node:hover .os-ico-wrap{
  border-color:color-mix(in srgb,var(--A) 50%,transparent);
  box-shadow:var(--gA);
  transform:scale(1.08) translateY(-3px);
}

/* Название модуля — всегда видно */
.os-node-title{
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
  text-align:center;color:var(--txt);margin-bottom:10px;
  transition:color .38s;line-height:1.3;
}
.os-node:hover .os-node-title{color:var(--A)}

/* Описание — плавно появляется при hover/клике */
.os-node-desc{
  font-size:11px;color:var(--txt2);line-height:1.58;text-align:center;
  max-height:0;overflow:hidden;opacity:0;
  transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .35s,color .55s;
}
.os-node:hover .os-node-desc,
.os-node.active .os-node-desc{
  max-height:80px;opacity:1;
}
/* Активное состояние (клик — фиксируется) */
.os-node.active{
  background:color-mix(in srgb,var(--A) 6%,var(--card));
  border-color:color-mix(in srgb,var(--A) 50%,transparent);
  z-index:2;
}
.os-node.active .os-ico-wrap{
  border-color:color-mix(in srgb,var(--A) 50%,transparent);
  box-shadow:var(--gA);
}
.os-node.active .os-node-title{color:var(--A)}

/* На мобильных — вертикальная раскладка */
@media(max-width:700px){
  #os-track{flex-direction:column;flex-wrap:nowrap;overflow-x:unset}
  .os-node{flex:unset;min-width:unset;width:100%;border-radius:0}
  .os-node:first-child{border-radius:16px 16px 0 0}
  .os-node:last-child{border-radius:0 0 16px 16px}
  .os-node+.os-node{border-left:1px solid var(--brd);border-top:none}
  .os-node:not(:last-child)::after{
    top:auto;bottom:-1px;right:20%;
    width:60%;height:2px;transform:none;
    background:linear-gradient(to right,transparent,var(--A),var(--B),var(--A),transparent);
  }
  .os-node-desc{max-height:unset;opacity:1;/* на мобильных всегда видно */}
}

/* ═══════════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════════ */
.dash-frame{background:var(--card);border:1px solid var(--brd);border-radius:26px;padding:32px;backdrop-filter:blur(24px);box-shadow:0 0 80px color-mix(in srgb,var(--A) 5%,transparent);position:relative;overflow:hidden;transition:all .55s}
.dash-frame::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--A) 38%,var(--B) 62%,transparent);transition:background .55s}
.dash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
@media(min-width:640px){.dash-grid{grid-template-columns:repeat(4,1fr)}}
.dash-cell{background:color-mix(in srgb,var(--bg) 55%,transparent);border:1px solid var(--brd);border-radius:14px;padding:18px 16px;position:relative;overflow:hidden;cursor:pointer;transition:all .35s}
.dash-cell::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--_ac,var(--A));transition:background .55s}
.dash-cell:hover,.dash-cell.active{border-color:color-mix(in srgb,var(--_ac,var(--A)) 42%,transparent);box-shadow:0 0 28px color-mix(in srgb,var(--_ac,var(--A)) 16%,transparent);transform:translateY(-3px)}
.dash-val{font-family:'Space Grotesk',sans-serif;font-size:clamp(22px,4vw,34px);font-weight:700;line-height:1;margin-bottom:4px;transition:color .55s}
.dash-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt2);transition:color .55s}
.dash-delta{font-family:'JetBrains Mono',monospace;font-size:10px;color:#00FF88;margin-top:8px}
.spark{display:flex;align-items:flex-end;gap:3px}
.sp-bar{flex:1;border-radius:2px 2px 0 0;transform-origin:bottom;transform:scaleY(0);transition:height .4s cubic-bezier(.4,0,.2,1),background .55s}

/* ═══════════════════════════════════════════════════
   КАЛЬКУЛЯТОР — КОМПАКТНЕЕ + LIQUID GLASS
═══════════════════════════════════════════════════ */
.calc-wrap{
  background:linear-gradient(135deg,color-mix(in srgb,var(--A) 4%,transparent),color-mix(in srgb,var(--B) 4%,transparent));
  border:1px solid var(--brd);border-radius:24px;
  /* Уменьшенный padding — блок компактнее */
  padding:36px 40px;
  position:relative;overflow:hidden;transition:all .55s;
}
@media(max-width:768px){.calc-wrap{padding:22px 16px;border-radius:16px}}
.calc-wrap::before{content:'';position:absolute;top:-80px;right:-80px;width:280px;height:280px;border-radius:50%;pointer-events:none;background:radial-gradient(circle,color-mix(in srgb,var(--A) 7%,transparent),transparent 70%);transition:background .55s}
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:36px;align-items:center}
@media(max-width:768px){.calc-grid{grid-template-columns:1fr;gap:24px}}
.sl-wrap{margin-bottom:20px}
.sl-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--txt2);margin-bottom:7px;display:block;transition:color .55s}
.sl-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
/* Уменьшенный размер значения слайдера */
.sl-val{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--A);transition:color .55s}
.sl-edge{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--txt2);transition:color .55s}
input[type="range"]{-webkit-appearance:none;width:100%;height:3px;border-radius:2px;background:var(--brd);outline:none;cursor:pointer;background-image:linear-gradient(var(--A),var(--A));background-size:50% 100%;background-repeat:no-repeat;transition:background-color .55s}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--A),var(--B));cursor:pointer;box-shadow:0 0 10px color-mix(in srgb,var(--A) 50%,transparent);border:2px solid var(--bg);transition:all .3s}
input[type="range"]::-webkit-slider-thumb:active{transform:scale(1.2)}
input[type="range"]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--A),var(--B));cursor:pointer;border:2px solid var(--bg)}

/* Liquid glass блок результата — усиленный эффект */
.roi-box{
  position:relative;border-radius:22px;
  /* Уменьшенный padding */
  padding:28px 28px 24px;
  text-align:center;
  /* Выраженный liquid glass */
  background:
    linear-gradient(135deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.04) 40%,rgba(255,255,255,.12) 100%);
  border:1px solid rgba(255,255,255,.18);
  backdrop-filter:blur(44px) saturate(1.8) brightness(1.06);
  -webkit-backdrop-filter:blur(44px) saturate(1.8) brightness(1.06);
  box-shadow:
    0 0 0 1px color-mix(in srgb,var(--A) 22%,transparent),
    inset 0 1px 0 rgba(255,255,255,.22),
    inset 0 -1px 0 rgba(0,0,0,.06),
    0 20px 70px color-mix(in srgb,var(--A) 16%,transparent),
    0 4px 18px rgba(0,0,0,.20);
  overflow:hidden;transform-style:preserve-3d;transition:box-shadow .3s,border-color .55s;
}
.roi-box::before{
  content:'';position:absolute;top:-60%;left:-60%;width:220%;height:220%;
  background:conic-gradient(from 0deg at 50% 50%,
    color-mix(in srgb,var(--A) 10%,transparent),
    color-mix(in srgb,var(--B) 8%,transparent),
    color-mix(in srgb,var(--C) 6%,transparent),
    color-mix(in srgb,var(--A) 10%,transparent));
  animation:lgspin 8s linear infinite;pointer-events:none;opacity:.7;transition:background .55s;
}
.roi-box::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.14),transparent 35%,rgba(255,255,255,.07));pointer-events:none;border-radius:22px}
@keyframes lgspin{100%{transform:rotate(360deg)}}
.roi-inner{position:relative;z-index:1}
/* Уменьшенный размер больших цифр — убираем миллионы */
.roi-big{
  font-family:'Space Grotesk',sans-serif;font-weight:700;line-height:1;
  /* Было clamp(44px,8vw,80px) — уменьшаем */
  font-size:clamp(28px,5vw,48px);
  margin:8px 0 4px;
}
.roi-meta{display:flex;justify-content:space-around;margin:16px 0 20px}
/* Уменьшенные числа в meta-блоке */
.rm-v{font-family:'Space Grotesk',sans-serif;font-size:clamp(16px,2.5vw,22px);font-weight:700;line-height:1;margin-bottom:3px}
.rm-l{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt2);transition:color .55s}

/* ═══════════════════════════════════════════════════
   AI СИМУЛЯТОР — частицы внутри карточки
═══════════════════════════════════════════════════ */
.sim-box{max-width:820px;margin:0 auto}
.sim-row{display:flex;gap:10px;flex-wrap:wrap}
.sim-inp{flex:1;min-width:220px;background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:16px 20px;font-family:'Inter',sans-serif;font-size:14px;color:var(--txt);outline:none;transition:all .3s;min-height:52px}
.sim-inp:focus{border-color:color-mix(in srgb,var(--A) 55%,transparent);box-shadow:0 0 20px color-mix(in srgb,var(--A) 11%,transparent)}
.sim-inp::placeholder{color:var(--txt2)}
.n-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.n-chip{font-family:'JetBrains Mono',monospace;font-size:10px;padding:8px 15px;background:color-mix(in srgb,var(--B) 7%,transparent);border:1px solid color-mix(in srgb,var(--B) 18%,transparent);border-radius:100px;cursor:pointer;color:var(--txt2);transition:all .25s;min-height:36px;display:flex;align-items:center;-webkit-tap-highlight-color:transparent}
.n-chip:hover{border-color:var(--B);color:var(--B);background:color-mix(in srgb,var(--B) 12%,transparent)}
.sim-analyzing{display:none;align-items:center;justify-content:center;gap:12px;padding:28px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:var(--A);transition:color .55s}
.spin{width:18px;height:18px;border-radius:50%;border:2px solid color-mix(in srgb,var(--A) 20%,transparent);border-top-color:var(--A);animation:spin .75s linear infinite;transition:border-color .55s}
@keyframes spin{to{transform:rotate(360deg)}}
.sim-res-wrap{
  position:relative;margin-top:18px;min-height:60px;
  /* Важно: карточка должна быть position:relative с overflow:hidden чтобы частицы не вылезали */
}
/* Canvas для частиц — строго внутри карточки */
#sim-px-canvas{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:10;
  border-radius:18px;
  display:none;
  /* overflow скрыт через родителя */
}
.sim-res{
  background:var(--card);
  border:1px solid color-mix(in srgb,var(--A) 28%,transparent);
  border-radius:18px;padding:28px;display:none;
  transition:background .55s,border-color .55s;
  /* Карточка остаётся целой, overflow скрывает вылетающие частицы */
  overflow:hidden;
  position:relative;
}
.sim-res.show{display:block}
.sim-mets{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin:16px 0}
@media(min-width:520px){.sim-mets{grid-template-columns:repeat(4,1fr)}}
.sim-m{background:color-mix(in srgb,var(--A) 6%,transparent);border:1px solid color-mix(in srgb,var(--A) 14%,transparent);border-radius:12px;padding:14px;text-align:center;transition:all .55s}
.sim-mv{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--A);margin-bottom:4px;transition:color .55s}
.sim-ml{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt2);transition:color .55s}

/* ═══════════════════════════════════════════════════
   КЕЙСЫ — LIQUID GLASS
═══════════════════════════════════════════════════ */
.cases-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:22px}
@media(max-width:640px){.cases-grid{grid-template-columns:1fr}}
.c-card{
  background:linear-gradient(135deg,rgba(255,255,255,.07),rgba(255,255,255,.02) 50%,rgba(255,255,255,.08));
  border:1px solid rgba(255,255,255,.11);
  backdrop-filter:blur(28px) saturate(1.3);-webkit-backdrop-filter:blur(28px) saturate(1.3);
  border-radius:22px;overflow:hidden;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.11),0 20px 60px rgba(0,0,0,.12);
  transition:all .45s cubic-bezier(.4,0,.2,1);position:relative;
}
.c-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,color-mix(in srgb,var(--B) 4%,transparent),transparent 60%);pointer-events:none;transition:background .55s;z-index:0}
.c-card:hover{border-color:rgba(255,255,255,.22);box-shadow:inset 0 1px 0 rgba(255,255,255,.16),0 0 50px color-mix(in srgb,var(--B) 14%,transparent),0 30px 80px rgba(0,0,0,.15);transform:translateY(-8px)}
.c-card>*{position:relative;z-index:1}
.c-head{padding:24px 24px 0}
.c-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.c-niche{font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;color:var(--txt)}
.c-tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:5px 12px;border-radius:100px}
.ba-wrap{position:relative;height:118px;overflow:hidden;margin-bottom:16px;border-radius:12px}
.ba-side{position:absolute;inset:0;border-radius:12px;padding:13px 14px;display:flex;flex-direction:column;justify-content:center;transition:transform .52s cubic-bezier(.4,0,.2,1)}
.ba-before{background:rgba(255,50,50,.07);border:1px solid rgba(255,60,60,.19);transform:translateX(0)}
.ba-after{background:rgba(0,255,136,.07);border:1px solid rgba(0,255,136,.19);transform:translateX(110%)}
.c-card:hover .ba-before{transform:translateX(-110%)}
.c-card:hover .ba-after{transform:translateX(0)}
.ba-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:9px}
.ba-before .ba-lbl{color:rgba(255,80,80,.8)}.ba-after .ba-lbl{color:rgba(0,255,136,.85)}
.ba-nums{display:flex;gap:18px}
.ba-nv{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;line-height:1}
.ba-before .ba-nv{color:rgba(255,90,90,.92)}.ba-after .ba-nv{color:rgba(0,255,136,.95)}
.ba-nl{font-size:9px;font-family:'JetBrains Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--txt2);margin-top:2px;transition:color .55s}
.c-period{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--A);margin-bottom:12px;padding:0 24px;transition:color .55s}
.c-foot{padding:18px 24px;border-top:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02)}
.c-quote{font-style:italic;color:var(--txt2);font-size:12px;line-height:1.65;margin-bottom:9px;transition:color .55s}
.c-author{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12px;color:var(--txt)}

/* ═══════════════════════════════════════════════════
   ПРОЦЕСС — АККОРДИОН
═══════════════════════════════════════════════════ */
.proc-list{display:flex;flex-direction:column;gap:10px;max-width:800px;margin:0 auto}
.proc-item{background:var(--card);border:1px solid var(--brd);border-radius:18px;overflow:hidden;transition:all .38s;cursor:pointer;-webkit-tap-highlight-color:transparent}
.proc-item.open{border-color:color-mix(in srgb,var(--A) 42%,transparent);box-shadow:var(--gA)}
.proc-head{display:flex;align-items:center;gap:16px;padding:20px 24px;user-select:none}
.proc-num{font-family:'Space Grotesk',sans-serif;font-size:clamp(28px,5vw,38px);font-weight:700;line-height:1;min-width:48px;background:linear-gradient(135deg,var(--A),var(--B));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex-shrink:0;transition:background .55s}
.proc-ico{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:color-mix(in srgb,var(--A) 10%,transparent);flex-shrink:0;transition:all .4s}
.proc-item.open .proc-ico{box-shadow:0 0 14px color-mix(in srgb,var(--A) 28%,transparent)}
.proc-ico svg{width:19px;height:19px;stroke:var(--A);transition:stroke .55s}
.proc-short{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt2);flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;transition:color .55s}
.proc-title-full{font-family:'Space Grotesk',sans-serif;font-size:clamp(14px,2.5vw,17px);font-weight:600;flex:1;display:none;color:var(--txt)}
.proc-item.open .proc-short{display:none}
.proc-item.open .proc-title-full{display:block}
.proc-chev{flex-shrink:0;transition:transform .42s cubic-bezier(.4,0,.2,1)}
.proc-chev svg{width:17px;height:17px;stroke:var(--txt2);transition:stroke .55s}
.proc-item.open .proc-chev{transform:rotate(180deg)}
.proc-body{max-height:0;overflow:hidden;transition:max-height .52s cubic-bezier(.4,0,.2,1)}
.proc-body-in{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:start;padding:0 24px 22px}
@media(max-width:500px){.proc-body-in{grid-template-columns:1fr}}
.proc-desc{font-size:14px;color:var(--txt2);line-height:1.76;transition:color .55s}
.proc-tl{display:flex;flex-direction:column;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-align:center;color:var(--A);min-width:72px;transition:color .55s}
.ptl-dot{width:9px;height:9px;border-radius:50%;background:var(--A);box-shadow:0 0 8px var(--A);animation:tlp 2.2s ease-in-out infinite;transition:background .55s,box-shadow .55s}
@keyframes tlp{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
.ptl-line{width:1px;height:28px;background:linear-gradient(to bottom,var(--A),transparent);transition:background .55s}

/* ═══════════════════════════════════════════════════
   ПАКЕТЫ
═══════════════════════════════════════════════════ */
.pkg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:22px;align-items:start}
@media(max-width:640px){.pkg-grid{grid-template-columns:1fr}}
.pkg-card{background:var(--card);border:1px solid var(--brd);border-radius:26px;padding:40px 32px;position:relative;overflow:hidden;backdrop-filter:blur(24px);transition:all .42s}
.pkg-card:hover{transform:translateY(-10px)}
.pkg-card.feat{border-color:color-mix(in srgb,var(--A) 50%,transparent);box-shadow:0 0 60px color-mix(in srgb,var(--A) 16%,transparent),inset 0 0 60px color-mix(in srgb,var(--A) 2%,transparent)}
.pkg-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--A),transparent);opacity:0;transition:opacity .42s,background .55s}
.pkg-card.feat::before,.pkg-card:hover::before{opacity:1}
.pkg-badge{position:absolute;top:16px;right:16px;background:linear-gradient(135deg,var(--A),var(--B));color:#fff;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:5px 12px;border-radius:100px;transition:background .55s}
.pkg-name{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--A);margin-bottom:8px;transition:color .55s}
.pkg-price{font-family:'Space Grotesk',sans-serif;font-size:clamp(38px,6vw,50px);font-weight:700;line-height:1;margin-bottom:4px;color:var(--txt)}
.pkg-sub{font-size:12px;color:var(--txt2);margin-bottom:26px;transition:color .55s}
.pkg-feats{display:flex;flex-direction:column;margin-bottom:28px}
.pkg-fi{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid color-mix(in srgb,var(--brd) 60%,transparent);font-size:12px;color:var(--txt2);transition:color .55s,border-color .55s}
.pkg-fi svg{width:13px;height:13px;stroke:var(--A);flex-shrink:0;margin-top:2px;transition:stroke .55s}

/* ═══════════════════════════════════════════════════
   CTA + ФОРМА
═══════════════════════════════════════════════════ */
.cta-wrap{background:linear-gradient(135deg,color-mix(in srgb,var(--A) 5%,transparent),color-mix(in srgb,var(--B) 5%,transparent),color-mix(in srgb,var(--C) 3%,transparent));border:1px solid var(--brd);border-radius:36px;padding:90px 56px;text-align:center;position:relative;overflow:hidden;transition:all .55s}
@media(max-width:768px){.cta-wrap{padding:52px 20px;border-radius:20px}}
.cta-wrap::before{content:'';position:absolute;top:-90px;left:50%;transform:translateX(-50%);width:480px;height:240px;pointer-events:none;background:radial-gradient(ellipse,color-mix(in srgb,var(--A) 8%,transparent),transparent 70%);transition:background .55s}
.form-wrap{max-width:580px;margin:0 auto;text-align:left}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:540px){.f2{grid-template-columns:1fr}}
.fg{display:flex;flex-direction:column;gap:6px}
.fl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--txt2);transition:color .55s}
.fi,.fs,.fta{background:var(--card);border:1px solid var(--brd);border-radius:11px;padding:13px 17px;font-family:'Inter',sans-serif;font-size:14px;color:var(--txt);outline:none;width:100%;transition:all .3s;min-height:48px}
.fi:focus,.fs:focus,.fta:focus{border-color:color-mix(in srgb,var(--A) 52%,transparent);box-shadow:0 0 18px color-mix(in srgb,var(--A) 11%,transparent)}
.fs option{background:var(--bg2)}
.fta{resize:vertical;min-height:96px}
.fi.err{border-color:#FF4444!important;animation:eshk .4s ease}
@keyframes eshk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.send-anim{display:none;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px}
.send-anim.show{display:flex}
.send-ring{width:80px;height:80px;border-radius:50%;border:3px solid transparent;border-top-color:var(--A);border-right-color:var(--B);animation:spin .8s linear infinite;margin-bottom:24px;box-shadow:0 0 30px color-mix(in srgb,var(--A) 30%,transparent);transition:border-color .55s,box-shadow .55s}
.send-txt-a{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:var(--A);transition:color .55s}
.ty-box{display:none;text-align:center;padding:56px 20px}
.ty-box.show{display:block;animation:fup .6s ease}
@keyframes fup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.ty-check{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--A),var(--B));display:flex;align-items:center;justify-content:center;margin:0 auto 22px;box-shadow:0 0 40px color-mix(in srgb,var(--A) 40%,transparent);transition:background .55s,box-shadow .55s}
.ty-check svg{width:36px;height:36px;stroke:#fff;stroke-width:2.5}
.ty-code{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--A);opacity:.75;margin-bottom:8px;transition:color .55s}
.ty-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(20px,4vw,28px);font-weight:700;margin-bottom:12px;color:var(--txt)}
.ty-sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--txt2);line-height:1.75;max-width:400px;margin:0 auto 30px;white-space:pre-line;transition:color .55s}
.direct-row{text-align:center;margin-top:36px}
.direct-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--txt2);margin-bottom:14px;display:block;transition:color .55s}

/* ═══════════════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════════════ */
.foot{border-top:1px solid var(--brd);padding:52px 0 32px;transition:border-color .55s}

   МОБИЛЬНЫЕ ПРАВКИ
═══════════════════════════════════════════════════ */
@media(max-width:480px){
  .hero-h{font-size:clamp(32px,11vw,52px)}

  .cta-wrap{padding:44px 16px}

  .proc-num{font-size:28px;min-width:38px}
}

<script>
if(typeof gsap!=='undefined'&&typeof ScrollTrigger!=='undefined') gsap.registerPlugin(ScrollTrigger);

// ─── HERO CANVAS — крупные частицы, вся зона hero ────────────
let hCtx=null,hW=0,hH=0,hAnim=null;
let hPts=[],mX=9999,mY=9999,mMoved=false,mT=null;

function themeRGB(){
  const t=CFG.theme;
  if(t==='neural')  return [[0,240,255],[199,36,255],[255,215,0]];
  if(t==='luxury')  return [[255,215,0],[199,36,255],[0,240,255]];
  if(t==='emerald') return [[0,255,136],[0,200,255],[255,215,0]];
  if(t==='indigo')  return [[79,110,247],[155,46,255],[255,107,46]];
  return [[0,240,255],[199,36,255],[255,215,0]];
}

function buildPts(){
  hPts=[];
  const clrs=themeRGB();
  const N=isFullFX()?CFG.particleCountDesktop:CFG.particleCountMobile;
  const sz=CFG.particleSize; // базовый размер частиц из конфига
  for(let i=0;i<N;i++){
    const c=clrs[i%clrs.length];
    hPts.push({
      // Частицы по всей ширине/высоте hero — полная зона
      x:Math.random()*hW,
      y:Math.random()*hH,
      vx:(Math.random()-.5)*CFG.particleSpeed,
      vy:(Math.random()-.5)*CFG.particleSpeed,
      // Крупнее — на основе particleSize из CONFIG
      r:sz*.6+Math.random()*sz,
      c,op:.45+Math.random()*.45,ph:Math.random()*Math.PI*2
    });
  }
}

function initCanvas(){
  const cv=document.getElementById('hero-canvas');
  if(!cv) return;
  hW=cv.width=cv.parentElement.clientWidth||window.innerWidth;
  hH=cv.height=cv.parentElement.clientHeight||window.innerHeight;
  hCtx=cv.getContext('2d');
  buildPts();
  if(hAnim) cancelAnimationFrame(hAnim);
  hLoop();
}

function stopCanvas(){
  if(hAnim){cancelAnimationFrame(hAnim);hAnim=null;}
  const cv=document.getElementById('hero-canvas');
  if(cv&&hCtx) hCtx.clearRect(0,0,hW,hH);
}

function hLoop(){
  hAnim=requestAnimationFrame(hLoop);
  if(!hCtx) return;
  const t=Date.now()*.001;
  const clrs=themeRGB();
  const CONN=CFG.particleConnDist;
  hCtx.clearRect(0,0,hW,hH);
  hPts.forEach((p,i)=>{
    // Частицы замирают при неподвижном курсоре, движутся при движении
    if(mMoved){
      const dx=mX-p.x,dy=mY-p.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<CFG.particleMouseRadius){
        const f=(CFG.particleMouseRadius-d)/CFG.particleMouseRadius*.003;
        p.vx=Math.max(-2,Math.min(2,p.vx+dx*f));
        p.vy=Math.max(-2,Math.min(2,p.vy+dy*f));
      }
      p.x+=p.vx; p.y+=p.vy;
    }
    // Отражение от краёв — во всей зоне hero
    if(p.x<-10||p.x>hW+10) p.vx*=-1;
    if(p.y<-10||p.y>hH+10) p.vy*=-1;
    p.ph+=.016;
    // Пауза при неподвижном курсоре — минимальная прозрачность
    const op=mMoved?p.op*(0.7+.3*Math.sin(t+p.ph)):p.op*.25;
    // Рисуем частицу — используем r из конфига
    hCtx.beginPath();
    hCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    hCtx.fillStyle=`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${op})`;
    hCtx.fill();
    // Свечение вокруг частицы
    const g=hCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*7);
    g.addColorStop(0,`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${op*.12})`);
    g.addColorStop(1,'transparent');
    hCtx.beginPath(); hCtx.arc(p.x,p.y,p.r*7,0,Math.PI*2);
    hCtx.fillStyle=g; hCtx.fill();
    // Связи между частицами
    for(let j=i+1;j<hPts.length;j++){
      const q=hPts[j];
      const dx=q.x-p.x,dy=q.y-p.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<CONN){
        const alpha=(1-d/CONN)*(mMoved?.22:.04)*(0.5+.5*Math.sin(t*.6));
        const cc=clrs[(i+j)%clrs.length];
        hCtx.beginPath();
        hCtx.moveTo(p.x,p.y); hCtx.lineTo(q.x,q.y);
        hCtx.strokeStyle=`rgba(${cc[0]},${cc[1]},${cc[2]},${alpha})`;
        hCtx.lineWidth=1; hCtx.stroke();
      }
    }
  });
}

// Мышь движется — активируем частицы
document.addEventListener('mousemove',e=>{
  mX=e.clientX;mY=e.clientY;mMoved=true;
  clearTimeout(mT);
  // Замираем через 2.5с после остановки курсора
  mT=setTimeout(()=>mMoved=false,2500);
},{passive:true});
document.addEventListener('touchmove',e=>{
  const t=e.touches[0];mX=t.clientX;mY=t.clientY;mMoved=true;
  clearTimeout(mT);mT=setTimeout(()=>mMoved=false,1800);
},{passive:true});

window.addEventListener('resize',()=>{
  CFG.isMobile=window.innerWidth<=900;
  if(isFullFX()){
    const cv=document.getElementById('hero-canvas');
    if(cv){hW=cv.width=cv.parentElement.clientWidth;hH=cv.height=cv.parentElement.clientHeight||window.innerHeight;buildPts();}
  }
},{passive:true});

// ─── SCRAMBLE ЭФФЕКТ для заголовка Hero ──────────────────────
const CHARS='ABCDEFGHIJKLMNOPQRSTUVWXYZАБВГДЕЖЗИКЛМНОПРСТУФХЦЧШЩЫЬЭЮЯ0123456789@#$%';
let scrambleIntervals=[];
let scrambleRestoreTimer=null;
let heroOrigText=''; // оригинальный HTML заголовка

function wrapHeroChars(){
  const el=document.getElementById('heroH');
  if(!el) return;
  // Запоминаем оригинальное содержимое (HTML с тегами)
  heroOrigText=el.innerHTML;
  // Оборачиваем только текстовые ноды, игнорируем span-теги
  // Используем innerHTML-замену для каждой буквы
  el.innerHTML=el.innerHTML.replace(/([^<>])/g,(ch)=>{
    if(ch===' '||ch==='\n') return ch;
    return `<span class="hero-char" data-orig="${ch}">${ch}</span>`;
  });
}

function scrambleHero(){
  clearTimeout(scrambleRestoreTimer);
  scrambleIntervals.forEach(clearInterval);
  scrambleIntervals=[];
  const chars=document.querySelectorAll('#heroH .hero-char');
  chars.forEach(span=>{
    const iv=setInterval(()=>{
      span.textContent=CHARS[Math.floor(Math.random()*CHARS.length)];
      span.classList.add('scrambling');
    },60);
    scrambleIntervals.push(iv);
  });
}

function restoreHero(){
  scrambleIntervals.forEach(clearInterval);
  scrambleIntervals=[];
  // Восстанавливаем побуквенно слева направо с небольшой задержкой
  const chars=document.querySelectorAll('#heroH .hero-char');
  chars.forEach((span,i)=>{
    scrambleRestoreTimer=setTimeout(()=>{
      span.textContent=span.dataset.orig||span.textContent;
      span.classList.remove('scrambling');
    },i*38+150); // задержка перед началом восстановления + пошаговое
  });
}

function initScramble(){
  const el=document.getElementById('heroH');
  if(!el) return;
  wrapHeroChars();
  el.addEventListener('mouseenter',scrambleHero,{passive:true});
  el.addEventListener('mouseleave',restoreHero,{passive:true});
  // На тач-устройствах
  el.addEventListener('touchstart',scrambleHero,{passive:true});
  el.addEventListener('touchend',restoreHero,{passive:true});
}

// ─── ТЕМА ───────────────────────────────────────────────────
function setTheme(t){
  CFG.theme=t;
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('bio-theme',t);

window.addEventListener('scroll',()=>{

// ─── PERF TOGGLE ─────────────────────────────────────────────
function togglePerf(){
  CFG.perfMode=CFG.perfMode==='auto'?'full':CFG.perfMode==='full'?'lite':'auto';
  localStorage.setItem('bio-perf',CFG.perfMode);

// ─── СЛАЙДЕРЫ ────────────────────────────────────────────────
function fillSl(el){
  const p=((+el.value-+el.min)/(+el.max-+el.min)*100).toFixed(1);
  el.style.backgroundSize=p+'% 100%';
}
function initSliders(){
  document.querySelectorAll('input[type="range"]').forEach(el=>{
    el.addEventListener('input',()=>fillSl(el),{passive:true});
    fillSl(el);
  });
}

// ─── ROI КАЛЬКУЛЯТОР — компактные цифры ──────────────────────
function calcUp(){
  const txt=T().calc;
  const b=+document.getElementById('slB').value;
  const c=+document.getElementById('slC').value;
  const v=+document.getElementById('slV').value;
  document.getElementById('svB').textContent='$'+b.toLocaleString();
  document.getElementById('svC').textContent='$'+c.toLocaleString();
  document.getElementById('svV').textContent=v.toFixed(1)+'%';
  ['slB','slC','slV'].forEach(id=>fillSl(document.getElementById(id)));
  const clicks=b/.85;
  const leads=Math.round(clicks*(v/100));
  const improved=Math.round(leads*c*txt.mult);
  const extra=improved-Math.round(leads*c);
  const roas=(improved/Math.max(b,1)).toFixed(1);
  // Форматируем: убираем огромные числа — показываем в K/M
  function fmt(n){
    if(n>=1000000) return '$'+(n/1000000).toFixed(1)+'M';
    if(n>=1000)    return '$'+(n/1000).toFixed(0)+'K';
    return '$'+n.toLocaleString();
  }
  function fmtP(n,pfx='',sfx=''){
    if(pfx==='$'){
      if(n>=1000000) return '$'+(n/1000000).toFixed(1)+'M';
      if(n>=1000)    return '$'+(n/1000).toFixed(0)+'K';
      return '$'+n.toLocaleString();
    }
    return pfx+n.toLocaleString()+sfx;
  }
  const an=(el,tgt,pfx='',sfx='',flt=false)=>{
    if(typeof gsap!=='undefined'){
      gsap.to({v:0},{v:tgt,duration:.5,ease:'power2.out',onUpdate:function(){
        const v2=this.targets()[0].v;
        if(pfx==='$'){el.textContent=fmtP(flt?+v2.toFixed(1):Math.round(v2),'$');}
        else if(pfx==='+$'){
          const vv=flt?+v2.toFixed(1):Math.round(v2);
          el.textContent='+'+fmtP(vv,'$');
        } else {
          el.textContent=pfx+(flt?v2.toFixed(1):Math.round(v2).toLocaleString())+sfx;
        }
      }});
    } else {
      if(pfx==='$') el.textContent=fmtP(tgt,'$');
      else if(pfx==='+$') el.textContent='+'+fmtP(tgt,'$');
      else el.textContent=pfx+tgt.toLocaleString()+sfx;
    }
  };
  an(document.getElementById('roiBig'),improved,'$');
  an(document.getElementById('roiLeads'),Math.round(leads*txt.mult));
  document.getElementById('roiRoas').textContent=roas+'\u00d7';
  an(document.getElementById('roiExtra'),extra,'+$');
}
// 3D tilt liquid glass
(()=>{
  const box=document.getElementById('roiBox');
  if(!box) return;
  box.addEventListener('mousemove',e=>{const r=box.getBoundingClientRect();const x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;box.style.transform=`rotateY(${x*8}deg) rotateX(${-y*8}deg) scale(1.02)`;},{passive:true});
  box.addEventListener('mouseleave',()=>{box.style.transform='';},{passive:true});
})();

// ─── DASHBOARD — метрика → график ────────────────────────────
let activeMetIdx=0;
function activateDashCard(idx){
  activeMetIdx=idx;
  document.querySelectorAll('.dash-cell').forEach((c,i)=>c.classList.toggle('active',i===idx));
  const m=T().dash.mets[idx];
  if(!m||!m.chartD) return;
  const cData=m.chartD,cMax=Math.max(...cData);
  const spark=document.getElementById('dashSpark');
  if(spark){
    const bars=spark.querySelectorAll('.sp-bar');
    const lbl=document.getElementById('dashChartLbl');
    if(lbl) lbl.textContent=m.l+' \u2014 '+T().dash.chartLbl;
    bars.forEach((b,i)=>{
      b.style.background=`linear-gradient(to top,${m.ac},var(--B))`;
      if(typeof gsap!=='undefined') gsap.to(b,{scaleY:cData[i]/cMax,duration:.42,ease:'power2.out'});
      else b.style.transform=`scaleY(${cData[i]/cMax})`;
    });
  }
}

// ─── OS: клик фиксирует карточку ──────────────────────────────
let activeOsNode=null;
function handleOsClick(node){
  if(activeOsNode===node){
    // Повторный клик — снимаем фиксацию
    node.classList.remove('active');
    activeOsNode=null;
    return;
  }
  if(activeOsNode) activeOsNode.classList.remove('active');
  node.classList.add('active');
  activeOsNode=node;
}

// ─── AI СИМУЛЯТОР — частицы СТРОГО внутри карточки ───────────
let spArr=[],spAnim=null;

function simExplode(cb){
  const res=document.getElementById('simRes');
  const cv=document.getElementById('sim-px-canvas');
  const wrap=document.getElementById('simResWrap');
  if(!cv||!wrap){if(res)res.style.display='none';cb&&cb();return;}

  // Размеры canvas = размер КАРТОЧКИ (sim-res), а не всего wrap
  // Карточка имеет overflow:hidden — частицы не вылезут
  const resRect=res.getBoundingClientRect();
  const wrapRect=wrap.getBoundingClientRect();
  // Canvas позиционируем поверх карточки внутри wrap
  const relTop=resRect.top-wrapRect.top;
  const relLeft=resRect.left-wrapRect.left;
  cv.style.top=relTop+'px';
  cv.style.left=relLeft+'px';
  cv.width=resRect.width;
  cv.height=resRect.height;
  cv.style.width=resRect.width+'px';
  cv.style.height=resRect.height+'px';
  cv.style.display='block';

  const ctx=cv.getContext('2d');
  const clrs=themeRGB();
  spArr=[];
  const N=isFullFX()?50:22;
  // Центр карточки как точка разлёта
  const cx=resRect.width/2;
  const cy=resRect.height/2;
  for(let i=0;i<N;i++){
    const ang=Math.random()*Math.PI*2;
    // Скорость ограничена — частицы не улетают далеко за края карточки
    const maxSpd=Math.min(resRect.width,resRect.height)*0.06; // 6% от размера карточки
    const spd=maxSpd*.3+Math.random()*maxSpd*.7;
    const c=clrs[i%clrs.length];
    spArr.push({
      x:cx,y:cy,
      vx:Math.cos(ang)*spd,
      vy:Math.sin(ang)*spd,
      r:2+Math.random()*3,op:1,c,
      // Границы движения — внутри карточки
      maxX:resRect.width,maxY:resRect.height
    });
  }

  // Скрываем контент карточки (но не саму карточку)
  if(typeof gsap!=='undefined'){
    const inner=res.querySelectorAll('h3,p,.sim-mets,.fM,[id^="sim"],.n-chips,div[style]');
    gsap.to(res,{opacity:0,duration:.2,ease:'power2.in',onComplete:()=>{res.style.visibility='hidden';}});
  } else {res.style.visibility='hidden';}

  cancelAnimationFrame(spAnim);
  function loop(){
    spAnim=requestAnimationFrame(loop);
    ctx.clearRect(0,0,cv.width,cv.height);
    let done=true;
    spArr.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      // Гравитация и затухание
      p.vy+=.12; p.vx*=.98; p.vy*=.97;
      // Отражение от краёв карточки — остаются внутри
      if(p.x<p.r){p.x=p.r;p.vx=Math.abs(p.vx)*.6;}
      if(p.x>p.maxX-p.r){p.x=p.maxX-p.r;p.vx=-Math.abs(p.vx)*.6;}
      if(p.y<p.r){p.y=p.r;p.vy=Math.abs(p.vy)*.6;}
      if(p.y>p.maxY-p.r){p.y=p.maxY-p.r;p.vy=-Math.abs(p.vy)*.6;}
      p.op-=.015;
      if(p.op>0){
        done=false;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${p.op})`;
        ctx.fill();
      }
    });
    if(done){
      cancelAnimationFrame(spAnim);
      ctx.clearRect(0,0,cv.width,cv.height);
      cv.style.display='none';
      cb&&cb();
    }
  }
  loop();
}

function runSim(preNiche){
  const inp=document.getElementById('simInp');
  const niche=preNiche||inp.value.trim();
  if(!niche){inp&&inp.focus();return;}
  if(inp) inp.value=niche;
  const an=document.getElementById('simAn');
  const res=document.getElementById('simRes');
  if(an) an.style.display='flex';
  if(res&&res.classList.contains('show')){
    simExplode(()=>{setTimeout(()=>{if(an)an.style.display='none';showSimResult(niche);},200);});
    setTimeout(()=>{if(an)an.style.display='none';},1600);
  } else {
    setTimeout(()=>{if(an)an.style.display='none';showSimResult(niche);},1350);
  }
}

function toggleProc(el){
  const isOpen=el.classList.contains('open');
  document.querySelectorAll('.proc-item').forEach(item=>{
    item.classList.remove('open');
    const b=item.querySelector('.proc-body');
    if(b) b.style.maxHeight='0';
  });
  if(!isOpen){
    el.classList.add('open');
    const body=el.querySelector('.proc-body');
    if(body) body.style.maxHeight=body.scrollHeight+'px';
    if(typeof gsap!=='undefined'){
      const inn=el.querySelector('.proc-body-in');
      if(inn) gsap.from(inn,{opacity:0,y:10,duration:.32,ease:'power2.out'});
    }
  }
}

        <div class="proc-ico">${svgI(s.ico,19,'var(--A)',1.9)}</div>
        <div class="proc-short fM">${s.t} \u2014 ${s.s}</div>
        <div class="proc-title-full fD">${s.t}</div>
        <div class="proc-chev">${svgI('chev',17,'var(--txt2)',1.9)}</div>
      </div>
      <div class="proc-body">
        <div class="proc-body-in">
          <p class="proc-desc">${s.d}</p>
          <div class="proc-tl">
            <div class="ptl-dot"></div>
            <div class="ptl-line"></div>
            <span class="fM" style="text-transform:uppercase;letter-spacing:.1em;">${s.dur}</span>
          </div>
        </div>
      </div>
    </div>`
  ).join('');

  // Packages
  const pkgLbl=document.getElementById('pkgLbl');if(pkgLbl) pkgLbl.textContent=t.pkg.lbl;
  const pkgH=document.getElementById('pkgH');if(pkgH) pkgH.textContent=t.pkg.title;
  const pkgSub=document.getElementById('pkgSub');if(pkgSub) pkgSub.textContent=t.pkg.sub;
  const pkgGrid=document.getElementById('pkgGrid');
  if(pkgGrid) pkgGrid.innerHTML=t.pkg.items.map(p=>`
    <div class="pkg-card ${p.feat?'feat':''}">
      ${p.badge?`<div class="pkg-badge fM">${p.badge}</div>`:''}
      <div class="pkg-name fM">${p.name}</div>
      <div class="pkg-price g-ab fD">${p.price}<span style="font-size:14px;font-weight:400;opacity:.52;">${p.sub}</span></div>
      <div class="pkg-sub">${p.desc}</div>
      <div class="pkg-feats">${p.fts.map(f=>`<div class="pkg-fi">${svgI('check',13,'var(--A)',2.2)}<span>${f}</span></div>`).join('')}</div>
      <button class="btn ${p.feat?'btn-p':'btn-g'}" onclick="goForm()" style="width:100%;padding:14px;">${t.pkg.cta}</button>
    </div>`
  ).join('');

  // CTA
  const ctaLbl=document.getElementById('ctaLbl');if(ctaLbl) ctaLbl.textContent=t.cta.lbl;
  const ctaH=document.getElementById('ctaH');if(ctaH) ctaH.textContent=t.cta.title;
  const ctaSub=document.getElementById('ctaSub');if(ctaSub) ctaSub.textContent=t.cta.sub;
  const formTitle=document.getElementById('formTitle');if(formTitle) formTitle.textContent=t.cta.fTitle;
  const flName=document.getElementById('flName');if(flName) flName.textContent=t.cta.fName;
  const flPhone=document.getElementById('flPhone');if(flPhone) flPhone.textContent=t.cta.fPhone;
  const flNiche=document.getElementById('flNiche');if(flNiche) flNiche.textContent=t.cta.fNiche;
  const flBudget=document.getElementById('flBudget');if(flBudget) flBudget.textContent=t.cta.fBudget;
  const flMsg=document.getElementById('flMsg');if(flMsg) flMsg.textContent=t.cta.fMsg;
  const fMsg=document.getElementById('fMsg');if(fMsg) fMsg.placeholder=t.cta.fMsg;
  const fSubmit=document.getElementById('fSubmit');if(fSubmit) fSubmit.textContent=t.cta.sub2;
  const directLbl=document.getElementById('directLbl');if(directLbl) directLbl.textContent=t.cta.direct;
  const fBudget=document.getElementById('fBudget');if(fBudget) fBudget.innerHTML=t.cta.budgets.map(b=>`<option>${b}</option>`).join('');

  // Контакты
  const waNum=CFG.wa.replace(/\D/g,'');
  const dWa=document.getElementById('dWa');if(dWa) dWa.href=`https://wa.me/${waNum}`;
  const dTg=document.getElementById('dTg');if(dTg) dTg.href=`https://t.me/${CFG.tg}`;
  const dEm=document.getElementById('dEm');if(dEm){dEm.href=`mailto:${CFG.em}`;dEm.textContent='Email \u2197';}

  // Footer
  const footLogo=document.getElementById('footLogo');if(footLogo) footLogo.textContent=t.nav.logo;
  const footTag=document.getElementById('footTag');if(footTag) footTag.textContent=t.foot.tag;
  const footCopy=document.getElementById('footCopy');if(footCopy) footCopy.textContent=t.foot.copy;
  const footL1=document.getElementById('footL1');if(footL1) footL1.textContent=t.foot.lnk[0];
  const footL2=document.getElementById('footL2');if(footL2) footL2.textContent=t.foot.lnk[1];

  updatePerfBtn();
}

function safeRender(){try{render();}catch(e){console.error('[BIO render]',e);}}

// ─── ИНИТ ─────────────────────────────────────────────────────
function init(){
  setTheme(CFG.theme);
  ['lb-ru','lb-en','mlb-ru','mlb-en'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.classList.toggle('on',id.endsWith(CFG.lang));
  });
  safeRender();
  initSliders();
  // Мобильные по умолчанию lite — инициируем canvas только если нужно
  if(isFullFX()) initCanvas();
  setTimeout(initGSAP,250);
  // Scramble эффект — инициируем после рендера
  setTimeout(initScramble,400);
  const s=CFG.seo;
  document.title=CFG.lang==='ru'?s.titleRu:s.titleEn;
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
} else {
  init();
}
</script>

</body>
</html>
